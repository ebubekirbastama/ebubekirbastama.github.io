body{

/* NAVBAR */
.navbar{
    background:rgba(255,255,255,0.95);

/* HERO */
.hero{
    padding:100px 20px 60px;
    text-align:center;
    background: linear-gradient(135deg,#1877f2,#0a3d91);
    color:#fff;
    position:relative;
    overflow:hidden;
    border-bottom-left-radius:50% 20%;
    border-bottom-right-radius:50% 20%;
}

.hero h1{
    font-weight:700;
    font-size:2.8rem;
}

.hero::before, .hero::after{
    content:'';
    position:absolute;
    border-radius:50%;
    opacity:0.3;
    transform:translate(-50%, -50%);
}

.hero::before{
    width:400px;
    height:400px;
    background:#1da1f2;
    top:20%;
    left:10%;
}

.hero::after{
    width:300px;
    height:300px;
    background:#6495ed;
    bottom:10%;
    right:15%;
}

/* CONTENT BOX FLEX */
.content-box{
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
    gap: 30px;
    max-width:900px;
    margin:auto;
    background:#fff;
    border-radius:20px;
    padding:40px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
    margin-top:-60px;
    position:relative;
    z-index:2;
}

/* GLASS */
.glass{
    flex: 1 1 300px;
    max-width: 450px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:25px;
    padding:40px;
    text-align:center;
}

/* HERO IMAGE */
.hero-img{
    flex: 1 1 300px;
    max-width: 450px;
    border-radius:25px;
    transition:0.5s;
    box-shadow:0 20px 60px rgba(0,0,0,0.6);
}

.hero-img:hover{
    transform:scale(1.07) rotate(-1deg);
}

/* HERO TEXT */
.glass h1 {
    font-size: 2.5rem;
    font-weight:700;
    letter-spacing:1px;
}

.glass h2 {
    font-size: 1.5rem;
    opacity:0.85;
}

/* FOOTER */
.footer{
    background:#0a0a0a;
    padding:60px 0;
    color:#aaa;
}

/* LINKS */
.footer a{
    color:#aaa;
    text-decoration:none;
    display:block;
    margin-bottom:8px;
    transition:0.3s;
}

.footer a:hover{
    color:#fff;
    transform:translateX(5px);
}

/* SOCIAL ICONS MODERN */
.social-icons a{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    width:50px;
    height:50px;
    margin-right:10px;
    border-radius:50%;
    background:#fff;
    color:#333;
    font-size:18px;
    font-weight:600;
    position:relative;
    overflow:hidden;
    transition:0.4s;
    box-shadow:0 6px 20px rgba(0,0,0,0.15);
}

.social-icons a::before{
    content:'';
    position:absolute;
    width:120%;
    height:120%;
    border-radius:50%;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) scale(0);
    transition:0.4s;
}

/* FACEBOOK */
.social-icons a.facebook:hover{
    background:#1877f2;
    color:#fff;
}
.social-icons a.facebook::before{
    background:rgba(24,119,242,0.2);
}
.social-icons a.facebook:hover::before{
    transform:translate(-50%,-50%) scale(1);
}

/* INSTAGRAM */
.social-icons a.instagram:hover{
    background:linear-gradient(45deg,#feda75,#d62976,#8134af,#515bd4);
    color:#fff;
}
.social-icons a.instagram::before{
    background:rgba(255,255,255,0.1);
}
.social-icons a.instagram:hover::before{
    transform:translate(-50%,-50%) scale(1);
}

/* X / TWITTER */
.social-icons a.twitter:hover{
    background:#1da1f2;
    color:#fff;
}
.social-icons a.twitter::before{
    background:rgba(29,161,242,0.2);
}
.social-icons a.twitter:hover::before{
    transform:translate(-50%,-50%) scale(1);
}

/* COPYRIGHT */
.copy{

/* MOBILE */
@media(max-width:992px){

@media(max-width:576px){

    }

    }
    .hero-img{
