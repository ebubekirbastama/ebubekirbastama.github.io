<style>
body{
    font-family:'Inter',sans-serif;
    background:#f5f5f5;
    color:#333;
    overflow-x:hidden;
}

/* NAVBAR */
.navbar{
    background:rgba(255,255,255,0.95);
    box-shadow:0 5px 20px rgba(0,0,0,0.05);
}

/* HERO */
.hero{
    padding:100px 20px 60px;
    text-align:center;
    background: linear-gradient(135deg,#1877f2,#0a3d91);
    color:#fff;
    position:relative;
    overflow:hidden;
    border-bottom-left-radius:50% 20%;
    border-bottom-right-radius:50% 20%;
}

.hero h1{
    font-weight:700;
    font-size:2.8rem;
}

.hero::before, .hero::after{
    content:'';
    position:absolute;
    border-radius:50%;
    opacity:0.3;
    transform:translate(-50%, -50%);
}

.hero::before{
    width:400px;
    height:400px;
    background:#ff3b3b;
    top:20%;
    left:10%;
}

.hero::after{
    width:300px;
    height:300px;
    background:#ff6b6b;
    bottom:10%;
    right:15%;
}

/* CONTENT BOX */
.content-box{
    max-width:900px;
    margin:auto;
    background:#fff;
    border-radius:20px;
    padding:40px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
    color:#333;
    margin-top:-60px;
    position:relative;
    z-index:2;
}

/* E-POSTA */
.content-box h4{
    margin-bottom:15px;
    font-weight:600;
}

.content-box a{
    color:#e30613;
    text-decoration:none;
    font-weight:500;
}

.content-box a:hover{
    text-decoration:underline;
}

/* SOCIAL */
.social-icons a{
    display:inline-flex;
    width:45px;
    height:45px;
    align-items:center;
    justify-content:center;
    border-radius:50%;
    background:rgba(255,255,255,0.08);
    color:#fff;
    margin-right:10px;
    transition:0.3s;
}

.social-icons a:hover{
    background:#e30613;
    transform:translateY(-5px) scale(1.1);
}

/* IMAGES */
.contact-images{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    margin-top:30px;
}

.contact-img{
    width:100%;
    max-width:280px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
    transition:0.3s;
}

.contact-img:hover{
    transform:scale(1.05);
}

/* FOOTER */
.footer{
    background:#111;
    color:#aaa;
    padding:60px 20px;
}

.footer h5{
    color:#fff;
    margin-bottom:15px;
}

.footer a{
    color:#aaa;
    text-decoration:none;
    display:block;
    margin-bottom:8px;
    transition:0.3s;
}

.footer a:hover{
    color:#fff;
    transform:translateX(5px);
}

/* SOCIAL */
.social-icons a{
    display:inline-flex;
    width:45px;
    height:45px;
    align-items:center;
    justify-content:center;
    border-radius:50%;
    background: #242121;
    color: #ffffff;
    margin-right:10px;
    transition:0.3s;
}

.social-icons a:hover{
    background:#e30613;
    transform:translateY(-5px) scale(1.1);
}

.copy{
    opacity:0.6;
    font-size:14px;
    margin-top:20px;
}

@media(max-width:768px){
    .content-box{
        padding:25px;
        margin-top:-40px;
    }
    .hero h1{
        font-size:2rem;
    }
    .contact-images{
        flex-direction:column;
        gap:15px;
    }
}
</style>
