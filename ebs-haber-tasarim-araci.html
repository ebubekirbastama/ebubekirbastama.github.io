<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
<title>EBS Haber Tasarım Aracı | Sosyal Medya Haber Görseli Oluştur</title>

<meta name="description" content="EBS haber tasarım aracı ile son dakika görselleri, sosyal medya haber postları ve dikkat çekici başlıklar kolayca oluşturun. Ücretsiz online editör.">

<meta name="keywords" content="EBS haber, haber tasarım aracı, son dakika görsel, haber post oluşturucu, sosyal medya haber tasarımı">

<meta name="author" content="EBS Haber">

<meta name="robots" content="index, follow">

<link rel="canonical" href="https://ebubekirbastama.com/EBS-haber-tasarim-araci">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@400;700&family=Roboto+Condensed:wght@700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

  <style>
    :root { --sidebar-width: 340px; --accent-color: #ffcc00; --bg-sidebar: #1a1a1a; }
    body { background: #121212; color: #e0e0e0; font-family: 'Oswald', sans-serif; margin: 0; display: flex; overflow: hidden; }

    .sidebar { width: var(--sidebar-width); background: var(--bg-sidebar); height: 100vh; position: fixed; left: 0; top: 0; padding: 20px; border-right: 1px solid #333; overflow-y: auto; z-index: 1000; }
    .sidebar h4 { color: #fff; border-bottom: 2px solid #444; padding-bottom: 10px; font-family: 'Anton', sans-serif; letter-spacing: 1px; }
    .sidebar h5 { font-size: 0.75rem; text-transform: uppercase; color: #888; margin-top: 20px; }
    .btn-tool { width: 100%; margin-bottom: 6px; text-align: left; display: flex; align-items: center; gap: 10px; padding: 8px 12px; font-size: 0.9rem; }

    .main-content { margin-left: var(--sidebar-width); width: calc(100% - var(--sidebar-width)); padding: 20px; display: flex; justify-content: center; overflow: auto; height: 100vh; }
    #canvasWrap { width: 1080px; height: 1080px; background: #000; position: relative; overflow: hidden; box-shadow: 0 0 50px rgba(0,0,0,0.8); background-size: cover; background-position: center; }

    .box { position: absolute; box-sizing: border-box; cursor: move; display: flex; align-items: center; justify-content: center; transform-origin: center; }
    .selected { outline: 3px solid var(--accent-color) !important; z-index: 9999 !important; }
    
    .photo-box { border: 2px solid #fff; background: #222; overflow: hidden; }
    .photo-box img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
    .photo-box.drag-over { border: 4px dashed var(--accent-color) !important; }

    .news-text { color: #fff; text-transform: uppercase; font-family: 'Anton', sans-serif; line-height: 1; white-space: nowrap; }
    .yellow-text { color: #ffcc00; }

    .son-dakika { background: #ce0000; color: #fff; padding: 5px 20px; border-radius: 50px; font-family: 'Anton', sans-serif; font-size: 30px; display: flex; flex-direction: column; align-items: center; }
    .video-icon { color: #fff; font-size: 40px; background: rgba(0,0,0,0.5); border-radius: 50%; width: 60px; height: 60px; border: 3px solid #fff; display: flex; align-items: center; justify-content: center; }
    .brush-splatter { background: radial-gradient(circle, #ce0000 0%, transparent 70%); filter: blur(5px); mix-blend-mode: lighten; opacity: 0.8; }

    .control-group { background: #2a2a2a; padding: 10px; border-radius: 6px; margin-bottom: 10px; }
    label { font-size: 0.7rem; color: #aaa; display: block; margin-bottom: 2px; }
  </style>
</head>
<body>

<div class="sidebar">
  <h4>EBS HABER v4.5</h4>

  <h5>ARKA PLAN</h5>
  <button class="btn btn-primary btn-tool" onclick="document.getElementById('bgInput').click()"><i class="fas fa-image"></i> Zemin Değiştir</button>
  <input type="file" id="bgInput" class="d-none" accept="image/*" onchange="setBG(event)">

  <h5>RESİM & ŞEKİL</h5>
  <button class="btn btn-outline-light btn-tool" onclick="addPhoto('square')">Resim Kutusu</button>
  <button class="btn btn-outline-light btn-tool" onclick="addPhoto('oval')">Oval Resim</button>
  <button class="btn btn-outline-danger btn-tool" onclick="addBrush()"><i class="fas fa-paint-brush"></i> Fırça Efekti (Splatter)</button>

  <h5>YAZI & SLOGAN</h5>
  <button class="btn btn-warning btn-tool" onclick="addText('BEYKOZ\'DA FECİ KAZA!', 'news-text', 70)">Ana Başlık</button>
  <button class="btn btn-outline-warning btn-tool" onclick="addText('11 KİŞİ YARALANDI!', 'news-text yellow-text', 60)">Sarı Alt Başlık</button>

  <h5>SİMGELER</h5>
  <button class="btn btn-danger btn-tool" onclick="addSonDakika()">SON DAKİKA Paneli</button>
  <button class="btn btn-dark btn-tool" onclick="addIcon('fa-play-circle')">Video Simgesi</button>
  <button class="btn btn-dark btn-tool" onclick="addIcon('fa-map-marker-alt')">Konum Simgesi</button>
  <button class="btn btn-dark btn-tool" onclick="addIcon('fa-exclamation-triangle')">Uyarı Simgesi</button>

  <h5>DÜZENLEME (SEÇİLİ ÖĞE)</h5>
  <div class="control-group">
    <label>YATAY BÜKME (SKEW X)</label>
    <input type="range" id="skewXSlider" class="form-range" min="-45" max="45" value="0" oninput="updateTransformation()">
    
    <label>DİKEY BÜKME (SKEW Y)</label>
    <input type="range" id="skewYSlider" class="form-range" min="-45" max="45" value="0" oninput="updateTransformation()">
    
    <label>ÜST OVAL</label>
    <input type="range" id="radiusTopSlider" class="form-range" min="0" max="300" value="0" oninput="updateRadius(this.value, 'top')">
    
    <label>ALT OVAL</label>
    <input type="range" id="radiusBottomSlider" class="form-range" min="0" max="300" value="0" oninput="updateRadius(this.value, 'bottom')">
  </div>

  <div class="control-group d-flex gap-2">
    <button class="btn btn-sm btn-warning w-50" onclick="changeZ(1)">Öne</button>
    <button class="btn btn-sm btn-danger w-50" onclick="deleteSelected()">SİL</button>
  </div>

  <button class="btn btn-success btn-lg w-100 mt-3" onclick="save()">TASARIMI İNDİR</button>
</div>

<div class="main-content">
  <div id="canvasWrap"></div>
</div>

<script>
  let selected = null;
  let zCounter = 100;

  function createBox(cls) {
    const el = document.createElement('div');
    el.className = 'box ' + cls;
    el.style.left = '100px'; el.style.top = '100px';
    el.style.zIndex = zCounter++;
    el.setAttribute('data-skewx', '0');
    el.setAttribute('data-skewy', '0');
    document.getElementById('canvasWrap').appendChild(el);
    return el;
  }

  function addPhoto(type) {
    const el = createBox('photo-box');
    el.style.width = '400px'; el.style.height = '300px';
    if(type==='oval') el.style.borderRadius = '150px 150px 0 0';
    const img = document.createElement('img');
    img.src = 'https://via.placeholder.com/600x400?text=Resmi+Buraya+Surukle';
    el.appendChild(img);
    setupDrop(el, img);
    addEvents(el);
  }

  function addText(val, cls, size) {
    const el = createBox(cls);
    el.contentEditable = true;
    el.style.fontSize = size + 'px';
    el.innerHTML = val;
    addEvents(el);
  }

  function addSonDakika() {
    const el = createBox('son-dakika');
    el.innerHTML = '<span>SON</span><div style="font-size:20px; background:#fff; color:#ce0000; padding:0 10px; border-radius:5px">DAKİKA</div>';
    addEvents(el);
  }

  function addBrush() {
    const el = createBox('brush-splatter');
    el.style.width = '400px'; el.style.height = '150px';
    addEvents(el);
  }

  function addIcon(iconClass) {
    const el = createBox('video-icon');
    el.innerHTML = `<i class="fas ${iconClass}"></i>`;
    addEvents(el);
  }

  function addEvents(el) {
    el.addEventListener('mousedown', () => select(el));
  }

  function select(el) {
    document.querySelectorAll('.box').forEach(b => b.classList.remove('selected'));
    selected = el;
    el.classList.add('selected');
    
    // Değerleri sliderlara geri yükle[cite: 1]
    document.getElementById('skewXSlider').value = el.getAttribute('data-skewx') || 0;
    document.getElementById('skewYSlider').value = el.getAttribute('data-skewy') || 0;
    
    const style = window.getComputedStyle(el);
    document.getElementById('radiusTopSlider').value = parseInt(style.borderTopLeftRadius) || 0;
    document.getElementById('radiusBottomSlider').value = parseInt(style.borderBottomLeftRadius) || 0;
  }

  function updateTransformation() {
    if(!selected) return;
    const sx = document.getElementById('skewXSlider').value;
    const sy = document.getElementById('skewYSlider').value;
    selected.style.transform = `skew(${sx}deg, ${sy}deg)`;
    selected.setAttribute('data-skewx', sx);
    selected.setAttribute('data-skewy', sy);
  }

  function updateRadius(val, pos) {
    if(!selected) return;
    if(pos === 'top') { 
      selected.style.borderTopLeftRadius = val+'px'; 
      selected.style.borderTopRightRadius = val+'px'; 
    } else { 
      selected.style.borderBottomLeftRadius = val+'px'; 
      selected.style.borderBottomRightRadius = val+'px'; 
    }
  }

  function setupDrop(el, img) {
    el.addEventListener('dragover', (e) => { e.preventDefault(); el.classList.add('drag-over'); });
    el.addEventListener('dragleave', () => el.classList.remove('drag-over'));
    el.addEventListener('drop', (e) => {
      e.preventDefault(); el.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if(file && file.type.startsWith('image/')) {
        const r = new FileReader(); r.onload = (ev) => img.src = ev.target.result; r.readAsDataURL(file);
      }
    });
  }

  interact('.box').draggable({
    listeners: { move(e) {
      const t = e.target;
      t.style.left = (parseFloat(t.style.left) + e.dx) + 'px';
      t.style.top = (parseFloat(t.style.top) + e.dy) + 'px';
    }}
  }).resizable({
    edges: { left: true, right: true, bottom: true, top: true },
    listeners: { move(e) {
      Object.assign(e.target.style, { width: `${e.rect.width}px`, height: `${e.rect.height}px` });
    }}
  });

  function setBG(e) {
    const r = new FileReader(); 
    r.onload = (ev) => document.getElementById('canvasWrap').style.backgroundImage = `url(${ev.target.result})`;
    r.readAsDataURL(e.target.files[0]);
  }

  function changeZ(v) { if(selected) selected.style.zIndex = parseInt(selected.style.zIndex) + v; }
  function deleteSelected() { if(selected) { selected.remove(); selected = null; } }

  function save() {
    document.querySelectorAll('.box').forEach(b => b.classList.remove('selected'));
    html2canvas(document.getElementById('canvasWrap'), { scale: 2 }).then(canvas => {
      const link = document.createElement('a'); 
      link.download = 'beykoz-haber.png'; link.href = canvas.toDataURL(); link.click();
    });
  }
</script>
</body>
</html>
