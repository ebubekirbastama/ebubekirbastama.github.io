<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EBS Video & Audio Editor Pro - Ebubekir Bastama</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-main: #090d16;
            --bg-card: #131b2e;
            --bg-track-video: #1e293b;
            --bg-track-audio: #0f172a;
            --accent-purple: #7c3aed;
            --accent-purple-hover: #6d28d9;
            --border-color: #334155;
            --text-muted: #94a3b8;
        }

        body {
            background-color: var(--bg-main);
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            user-select: none;
            margin: 0;
            padding-bottom: 20px;
            transition: padding-bottom 0.3s ease;
        }
        
        body.is-fixed {
            padding-bottom: 380px;
        }

        .navbar-brand-pro {
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #38bdf8, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .pro-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            box-shadow: 0 10px 30px -12px rgba(0,0,0,0.4);
            transition: all 0.3s ease;
        }

        .preview-box {
            background: #020617;
            border-radius: 16px;
            height: 440px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 1px solid var(--border-color);
            position: relative;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.6);
        }
        
        video {
            max-width: 100%;
            max-height: 100%;
            display: none;
            object-fit: contain;
        }

        .btn-pro-primary {
            background: linear-gradient(135deg, var(--accent-purple), #4f46e5);
            border: none;
            color: #fff;
            font-weight: 600;
            transition: opacity 0.2s ease;
        }
        .btn-pro-primary:hover {
            opacity: 0.92;
            color: #fff;
        }
        .btn-pro-outline {
            border: 1px solid var(--border-color);
            color: #cbd5e1;
            background: transparent;
            font-weight: 500;
        }
        .btn-pro-outline:hover {
            background: #1e293b;
            color: #fff;
        }

        .form-control-pro {
            background: #0f172a;
            border: 1px solid var(--border-color);
            color: #f8fafc;
            border-radius: 10px;
        }
        .form-control-pro:focus {
            background: #131b2e;
            border-color: var(--accent-purple);
            box-shadow: 0 0 0 2px rgba(124, 58, 237, 0.25);
            color: #fff;
        }

        /* TIMELINE PANEL */
        .editor-timeline {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
        }

        .editor-timeline.fixed-bottom-mode {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 350px;
            border-radius: 0;
            border-top: 1px solid var(--border-color);
            background: #0d1321;
            z-index: 1050;
            padding: 16px 24px;
        }
        
        .timeline-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 14px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .timeline-ruler {
            position: relative;
            background: #070a13;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            overflow-x: auto;
            overflow-y: auto;
            flex-grow: 1;
            min-height: 180px;
            max-height: 240px;
        }
        
        .time-ticks {
            height: 32px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: sticky;
            top: 0;
            background: #0d1321;
            z-index: 101;
        }
        .tick {
            position: absolute;
            bottom: 0;
            width: 1px;
            height: 12px;
            background: #475569;
            font-size: 11px;
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-muted);
            padding-left: 6px;
        }
        
        .track-video {
            position: relative;
            height: 48px;
            background: var(--bg-track-video);
            margin-top: 10px;
            border-radius: 8px;
            border: 1px solid #475569;
            display: flex;
            align-items: center;
            padding-left: 16px;
            color: #cbd5e1;
            font-size: 13px;
            font-weight: 600;
        }
        
        .track-audio {
            position: relative;
            height: 58px;
            background: var(--bg-track-audio);
            margin-top: 10px;
            border-radius: 8px;
            border: 1px dashed #475569;
        }
        
        .audio-clip {
            position: absolute;
            top: 5px;
            height: 46px;
            background: linear-gradient(135deg, var(--accent-purple), #581c87);
            color: #fff;
            border: 1px solid #a855f7;
            border-radius: 8px;
            cursor: grab;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            box-shadow: 0 4px 14px rgba(124, 58, 237, 0.4);
        }
        .audio-clip:active { cursor: grabbing; }

        .ripple-delete-btn {
            position: absolute;
            top: 12px;
            height: 32px;
            background: #dc2626;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 110;
            box-shadow: 0 2px 8px rgba(220, 38, 38, 0.4);
            white-space: nowrap;
            padding: 0 8px;
            transition: background 0.2s;
        }
        .ripple-delete-btn:hover {
            background: #b91c1c;
        }

        .playhead {
            position: absolute;
            top: 0; bottom: 0;
            width: 2px;
            background: #ef4444;
            z-index: 100;
            pointer-events: none;
            box-shadow: 0 0 8px #ef4444;
        }

        .render-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(9, 13, 22, 0.94);
            color: #fff;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            border-radius: 16px;
            backdrop-filter: blur(8px);
        }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-transparent border-bottom border-secondary border-opacity-10 py-3">
    <div class="container-fluid px-4">
        <span class="navbar-brand mb-0 h1 navbar-brand-pro fs-4">
            <i class="bi bi-cpu-fill me-2"></i>EBS PRO EDITOR
        </span>
        <span class="badge bg-danger bg-opacity-10 text-danger border border-danger border-opacity-25 px-3 py-2 fw-semibold">
            <i class="bi bi-hd-fill me-1"></i> ebubekirbastama.com.tr
        </span>
    </div>
</nav>

<div class="container-fluid px-4 mt-4">
    <div class="row g-4">
        <div class="col-xl-4 col-lg-5">
            <div class="pro-card p-4 mb-3 d-flex flex-column justify-content-between" style="min-height: 440px;">
                <div>
                    <h5 class="fw-bold mb-3 d-flex align-items-center">
                        <i class="bi bi-folder-symlink text-info me-2"></i> Medya Dosyaları
                    </h5>
                    
                    <div class="mb-3">
                        <label class="form-label text-muted fw-medium small">1. Orijinal Video</label>
                        <input type="file" id="videoInput" class="form-control form-control-pro" accept="video/*">
                    </div>

                    <div class="mb-4">
                        <label class="form-label text-muted fw-medium small">2. Yeni Ses / Dublaj</label>
                        <input type="file" id="audioInput" class="form-control form-control-pro" accept="audio/*">
                    </div>
                </div>

                <div>
                    <hr class="border-secondary border-opacity-20">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <span class="text-muted small">Başlangıç Zamanı (Offset):</span>
                        <strong id="startTimeDisplay" class="text-info fs-5 font-monospace">0.00s</strong>
                    </div>
                    <button type="button" id="exportBtn" class="btn btn-pro-primary btn-lg w-100 py-3 d-flex align-items-center justify-content-center" disabled>
                        <i class="bi bi-box-arrow-down me-2 fs-5"></i> Videoyu Kaydet / İndir
                    </button>
                </div>
            </div>
        </div>

        <div class="col-xl-8 col-lg-7">
            <div class="preview-box">
                <video id="videoPlayer" preload="auto"></video>
                <div id="videoPlaceholder" class="text-muted text-center p-3">
                    <i class="bi bi-film fs-1 d-block mb-2 text-secondary"></i>
                    <p class="mb-0 small fw-medium">Lütfen düzenlemek istediğiniz videoyu seçin</p>
                </div>

                <div id="renderOverlay" class="render-overlay">
                    <div class="spinner-border text-info mb-3" role="status" style="width: 3.5rem; height: 3.5rem; border-width: 0.25em;"></div>
                    <h5 class="fw-bold mb-2 text-white" id="renderProgressHeader">Yeni Video Hazırlanıyor</h5>
                    <p class="mb-3 text-muted fs-6" id="renderProgress">Video ve ses birleştiriliyor...</p>
                    <button type="button" id="cancelRenderBtn" class="btn btn-danger px-4 py-2 fw-semibold">
                        <i class="bi bi-x-circle me-1"></i> İşlemi İptal Et
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="row mt-4">
        <div class="col-12" id="inlineTimelineWrapper">
            <div class="editor-timeline" id="editorTimeline">
                <div class="timeline-header">
                    <div class="btn-group">
                        <button type="button" id="playBtn" class="btn btn-pro-primary px-4" disabled>
                            <i class="bi bi-play-fill me-1"></i> Oynat
                        </button>
                        <button type="button" id="pauseBtn" class="btn btn-pro-outline px-4" disabled>
                            <i class="bi bi-pause-fill me-1"></i> Duraklat
                        </button>
                    </div>

                    <div>
                        <button type="button" id="togglePosBtn" class="btn btn-pro-outline fw-semibold d-flex align-items-center">
                            <i id="toggleIcon" class="bi bi-arrow-down-square me-2"></i> <span id="toggleText">Aşağı İndir</span>
                        </button>
                    </div>

                    <div class="d-flex align-items-center bg-black bg-opacity-50 text-white px-3 py-2 rounded-3 border border-secondary border-opacity-25 shadow-sm">
                        <i class="bi bi-clock-history me-2 text-info"></i>
                        <span id="timeDisplay" class="fs-6 fw-bold font-monospace">00:00.00 / 00:00.00</span>
                    </div>
                </div>

                <div class="timeline-ruler" id="timelineRuler">
                    <div id="playhead" class="playhead" style="left: 0%;"></div>
                    <div id="timeTicks" class="time-ticks"></div>

                    <div class="track-video">
                        <i class="bi bi-film me-2 text-info"></i> Orijinal Video Kanalı
                    </div>

                    <div class="track-audio" id="audioTrack">
                        <button type="button" id="rippleDeleteBtn" class="ripple-delete-btn">
                            <i class="bi bi-cut me-1"></i> Boşluğu & Videoyu Kes
                        </button>

                        <div id="audioClip" class="audio-clip" style="display: none; left: 0px;">
                            <span><i class="bi bi-waveform me-2"></i> Yeni Ses Klibi</span>
                            <i class="bi bi-arrows-expand fs-6" style="transform: rotate(90deg);"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<canvas id="renderCanvas" style="display: none;"></canvas>
<audio id="audioPlayer" preload="auto"></audio>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const videoInput = document.getElementById('videoInput');
    const audioInput = document.getElementById('audioInput');
    const videoPlayer = document.getElementById('videoPlayer');
    const audioPlayer = document.getElementById('audioPlayer');
    const videoPlaceholder = document.getElementById('videoPlaceholder');
    const playBtn = document.getElementById('playBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const exportBtn = document.getElementById('exportBtn');
    const timeDisplay = document.getElementById('timeDisplay');
    const startTimeDisplay = document.getElementById('startTimeDisplay');
    
    const togglePosBtn = document.getElementById('togglePosBtn');
    const toggleIcon = document.getElementById('toggleIcon');
    const toggleText = document.getElementById('toggleText');
    const editorTimeline = document.getElementById('editorTimeline');
    const inlineTimelineWrapper = document.getElementById('inlineTimelineWrapper');

    const timelineRuler = document.getElementById('timelineRuler');
    const playhead = document.getElementById('playhead');
    const timeTicks = document.getElementById('timeTicks');
    const audioClip = document.getElementById('audioClip');
    const rippleDeleteBtn = document.getElementById('rippleDeleteBtn');

    const renderOverlay = document.getElementById('renderOverlay');
    const renderProgressHeader = document.getElementById('renderProgressHeader');
    const renderProgress = document.getElementById('renderProgress');
    const cancelRenderBtn = document.getElementById('cancelRenderBtn');
    const renderCanvas = document.getElementById('renderCanvas');

    let isVideoLoaded = false;
    let isAudioLoaded = false;
    
    let audioOffset = 0; 
    let videoStartTime = 0; 
    
    let pixelsPerSecond = 32;
    let isFixedBottom = false;

    // Kilitlenmeyi tamamen çözen global referanslar
    let mediaRecorder = null;
    let audioCtx = null;
    let audioSource = null;
    let isRendering = false;

    togglePosBtn.addEventListener('click', function() {
        isFixedBottom = !isFixedBottom;
        if (isFixedBottom) {
            document.body.classList.add('is-fixed');
            editorTimeline.classList.add('fixed-bottom-mode');
            document.body.appendChild(editorTimeline);
            toggleIcon.className = "bi bi-arrow-up-square me-2";
            toggleText.innerText = "Yukarı Kaldır";
        } else {
            document.body.classList.remove('is-fixed');
            editorTimeline.classList.remove('fixed-bottom-mode');
            inlineTimelineWrapper.appendChild(editorTimeline);
            toggleIcon.className = "bi bi-arrow-down-square me-2";
            toggleText.innerText = "Aşağı İndir";
        }
    });

    videoInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const fileURL = URL.createObjectURL(file);
            videoPlayer.src = fileURL;
            videoPlayer.style.display = 'block';
            videoPlaceholder.style.display = 'none';
            videoPlayer.volume = 0;
            videoStartTime = 0;

            videoPlayer.onloadedmetadata = function() {
                isVideoLoaded = true;
                playBtn.disabled = false;
                pauseBtn.disabled = false;
                setupTimeline();
                updateTimeDisplay();
                checkReady();
            };
        }
    });

    audioInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const fileURL = URL.createObjectURL(file);
            audioPlayer.src = fileURL;
            
            audioPlayer.onloadedmetadata = function() {
                isAudioLoaded = true;
                audioClip.style.display = 'flex';
                audioClip.style.width = `${audioPlayer.duration * pixelsPerSecond}px`;
                syncAudioPosition();
                checkReady();
            };
        }
    });

    function checkReady() {
        if (isVideoLoaded && isAudioLoaded) {
            exportBtn.disabled = false;
        }
    }

    function setupTimeline() {
        const duration = videoPlayer.duration - videoStartTime;
        timeTicks.innerHTML = '';
        for (let i = 0; i <= duration; i += 5) { 
            const tick = document.createElement('div');
            tick.className = 'tick';
            tick.style.left = `${i * pixelsPerSecond}px`;
            tick.innerHTML = `<span>${i}s</span>`;
            timeTicks.appendChild(tick);
        }
    }

    videoPlayer.addEventListener('timeupdate', function() {
        const adjustedCurrentTime = videoPlayer.currentTime - videoStartTime;
        updateTimeDisplay();
        
        const currentPos = adjustedCurrentTime * pixelsPerSecond;
        playhead.style.left = `${currentPos}px`;

        if (isAudioLoaded && !isRendering) {
            if (adjustedCurrentTime >= audioOffset) {
                const targetAudioTime = adjustedCurrentTime - audioOffset;
                if (targetAudioTime <= audioPlayer.duration) {
                    if (Math.abs(audioPlayer.currentTime - targetAudioTime) > 0.15) {
                        audioPlayer.currentTime = targetAudioTime;
                    }
                    if (audioPlayer.paused && !videoPlayer.paused) {
                        audioPlayer.play().catch(e => console.log(e));
                    }
                } else {
                    audioPlayer.pause();
                }
            } else {
                audioPlayer.pause();
                audioPlayer.currentTime = 0;
            }
        }
    });

    // Sürükle ve Bırak
    let isDragging = false;
    let startX = 0;
    let initialLeft = 0;

    audioClip.addEventListener('mousedown', function(e) {
        isDragging = true;
        startX = e.clientX;
        initialLeft = parseInt(audioClip.style.left) || 0;
        audioClip.style.cursor = 'grabbing';
    });

    window.addEventListener('mousemove', function(e) {
        if (!isDragging) return;

        const deltaX = e.clientX - startX;
        let newLeft = initialLeft + deltaX;

        if (newLeft < 0) newLeft = 0;
        const absoluteMax = (videoPlayer.duration - videoStartTime) * pixelsPerSecond;
        if (newLeft > absoluteMax) newLeft = absoluteMax;

        audioClip.style.left = `${newLeft}px`;
        audioOffset = newLeft / pixelsPerSecond;
        startTimeDisplay.innerText = `${audioOffset.toFixed(2)}s`;

        updateRippleButton(newLeft);
    });

    window.addEventListener('mouseup', function() {
        if (isDragging) {
            isDragging = false;
            audioClip.style.cursor = 'grab';
            syncAudioPosition();
        }
    });

    function updateRippleButton(leftPos) {
        if (leftPos > 15) { 
            rippleDeleteBtn.style.left = `0px`;
            rippleDeleteBtn.style.width = `${leftPos - 4}px`;
            rippleDeleteBtn.style.display = 'flex';
        } else {
            rippleDeleteBtn.style.display = 'none';
        }
    }

    rippleDeleteBtn.addEventListener('click', function() {
        if (!isVideoLoaded || !isAudioLoaded) return;
        const gapDuration = audioOffset; 
        if (gapDuration <= 0) return;

        videoStartTime += gapDuration;
        audioOffset = 0;
        audioClip.style.left = '0px';
        startTimeDisplay.innerText = `0.00s`;
        rippleDeleteBtn.style.display = 'none';

        videoPlayer.currentTime = videoStartTime;
        audioPlayer.currentTime = 0;

        setupTimeline();
        updateTimeDisplay();
    });

    function syncAudioPosition() {
        if (!isAudioLoaded || isRendering) return;
        const adjustedTime = videoPlayer.currentTime - videoStartTime;
        const targetAudioTime = adjustedTime - audioOffset;
        
        if (targetAudioTime >= 0 && targetAudioTime <= audioPlayer.duration) {
            audioPlayer.currentTime = targetAudioTime;
            if (!videoPlayer.paused) audioPlayer.play();
        } else {
            audioPlayer.pause();
            audioPlayer.currentTime = 0;
        }
    }

    timelineRuler.addEventListener('click', function(e) {
        if (!isVideoLoaded || isDragging) return;
        if (e.target.closest('#audioClip') || e.target.closest('#rippleDeleteBtn')) return;

        const rect = timelineRuler.getBoundingClientRect();
        const clickX = e.clientX - rect.left + timelineRuler.scrollLeft;
        const targetAdjustedTime = clickX / pixelsPerSecond;
        
        if (targetAdjustedTime <= (videoPlayer.duration - videoStartTime)) {
            videoPlayer.currentTime = videoStartTime + targetAdjustedTime;
        }
    });

    playBtn.addEventListener('click', () => {
        videoPlayer.play();
        syncAudioPosition();
    });

    pauseBtn.addEventListener('click', () => {
        videoPlayer.pause();
        if (isAudioLoaded) audioPlayer.pause();
    });

    // ==========================================
    // BUG-FREE EXPORT & CLEANUP MOTORU
    // ==========================================
    function stopRenderAndCleanup() {
        isRendering = false;
        renderOverlay.style.display = 'none';

        if (mediaRecorder && mediaRecorder.state !== 'inactive') {
            mediaRecorder.stop();
        }
        
        videoPlayer.pause();
        audioPlayer.pause();

        if (audioCtx) {
            audioCtx.close().catch(e => console.log("Context kapatma hatası:", e));
            audioCtx = null;
        }
        audioSource = null;

        videoPlayer.currentTime = videoStartTime;
        audioPlayer.currentTime = 0;
    }

    cancelRenderBtn.addEventListener('click', stopRenderAndCleanup);

    exportBtn.addEventListener('click', async function() {
        if (!isVideoLoaded || !isAudioLoaded || isRendering) return;

        isRendering = true;
        videoPlayer.pause();
        audioPlayer.pause();

        renderOverlay.style.display = 'flex';
        renderProgressHeader.innerText = "Video İşleniyor";
        renderProgress.innerText = "Kırpılmış MP4 dosyası en yüksek kalitede kaydediliyor...";

        videoPlayer.currentTime = videoStartTime;
        audioPlayer.currentTime = 0;

        renderCanvas.width = videoPlayer.videoWidth || 1920;
        renderCanvas.height = videoPlayer.videoHeight || 1080;
        const ctx = renderCanvas.getContext('2d');

        // Her defasında sıfırdan oluşturulur
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const dest = audioCtx.createMediaStreamDestination();
        audioSource = audioCtx.createMediaElementSource(audioPlayer);
        audioSource.connect(dest);

        const videoStream = renderCanvas.captureStream(30);
        const combinedStream = new MediaStream([
            ...videoStream.getVideoTracks(),
            ...dest.stream.getAudioTracks()
        ]);

        let recordedChunks = [];
        const options = { mimeType: 'video/mp4', videoBitsPerSecond: 15000000 };
        
        try {
            mediaRecorder = new MediaRecorder(combinedStream, options);
        } catch (e) {
            mediaRecorder = new MediaRecorder(combinedStream, { videoBitsPerSecond: 15000000 });
        }

        mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
        
        mediaRecorder.onstop = () => {
            if (recordedChunks.length > 0) {
                const blob = new Blob(recordedChunks, { type: 'video/mp4' });
                const downloadUrl = URL.createObjectURL(blob);

                const a = document.createElement('a');
                a.href = downloadUrl;
                a.download = `elite-pro-${videoPlayer.videoWidth}x${videoPlayer.videoHeight}.mp4`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            }
            stopRenderAndCleanup();
        };

        mediaRecorder.start();
        videoPlayer.play();

        function renderFrame() {
            if (!isRendering || videoPlayer.paused || videoPlayer.ended) return;
            ctx.drawImage(videoPlayer, 0, 0, renderCanvas.width, renderCanvas.height);
            
            const adjustedTime = videoPlayer.currentTime - videoStartTime;
            if (adjustedTime >= audioOffset) {
                if (audioPlayer.paused && (adjustedTime - audioOffset < audioPlayer.duration)) {
                    audioPlayer.play().catch(e => console.log(e));
                }
            }

            const totalDuration = videoPlayer.duration - videoStartTime;
            const progress = (adjustedTime / totalDuration) * 100;
            renderProgressHeader.innerText = `İşlem: %${Math.min(100, Math.floor(progress))} Tamamlandı`;
            requestAnimationFrame(renderFrame);
        }

        videoPlayer.addEventListener('play', function onPlay() {
            if (isRendering) renderFrame();
            videoPlayer.removeEventListener('play', onPlay);
        });

        videoPlayer.onended = () => {
            if (isRendering) mediaRecorder.stop();
        };
    });

    function formatTime(seconds) {
        const min = Math.floor(seconds / 60);
        const sec = Math.floor(seconds % 60);
        const ms = Math.floor((seconds % 1) * 100);
        return `${min < 10 ? '0' + min : min}:${sec < 10 ? '0' + sec : sec}.${ms < 10 ? '0' + ms : ms}`;
    }

    function updateTimeDisplay() {
        const adjustedCurrentTime = Math.max(0, videoPlayer.currentTime - videoStartTime);
        const adjustedTotalTime = Math.max(0, videoPlayer.duration - videoStartTime);
        timeDisplay.innerText = `${formatTime(adjustedCurrentTime)} / ${formatTime(adjustedTotalTime)}`;
    }
</script>
</body>
</html>
