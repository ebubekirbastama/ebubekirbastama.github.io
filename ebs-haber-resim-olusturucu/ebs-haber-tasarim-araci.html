<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <title>EBS Haber Tasarım Aracı | Sosyal Medya Haber Görseli Oluştur</title>
  <meta name="description" content="EBS haber tasarım aracı ile son dakika görselleri, sosyal medya haber postları ve dikkat çekici başlıklar kolayca oluşturun. Ücretsiz online editör.">
  <meta name="keywords" content="EBS haber, haber tasarım aracı, son dakika görsel, haber post oluşturucu, sosyal medya haber tasarımı">
  <meta name="author" content="EBS Haber">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://ebubekirbastama.com/EBS-haber-tasarim-araci">
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@400;700&family=Roboto+Condensed:wght@400;700&family=Montserrat:wght@400;700&family=Poppins:wght@400;700&family=Teko:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="ebs.css">

  <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="ebss.js"></script>
</head>
<body>

<div class="sidebar">
  <h4>EBS HABER v5.0</h4>

  <h5>ARKA PLAN</h5>
  <button class="btn btn-primary btn-tool mb-2" onclick="document.getElementById('bgInput').click()"><i class="fas fa-image"></i> Zemin Değiştir</button>
  <input type="file" id="bgInput" class="d-none" accept="image/*" onchange="setBG(event)">
  
  <label>ZEMİN RENGİ</label>
  <input type="color" id="bgColorPicker" class="form-control form-control-color w-100 mb-3" value="#000000" oninput="changeBgColor(this.value)">

<h5>RESİM & ŞEKİL</h5>
<button class="btn btn-outline-light btn-tool" onclick="addPhoto('square')">Resim Kutusu</button>
<button class="btn btn-outline-light btn-tool" onclick="addPhoto('oval')">Oval Resim</button>
<button class="btn btn-outline-warning btn-tool" onclick="addSketchPhoto()"><i class="fas fa-pencil-alt"></i> Kuru Boya Resim</button>
<button class="btn btn-outline-danger btn-tool" onclick="addBrush()"><i class="fas fa-paint-brush"></i> Fırça Efekti (Splatter)</button>
<button class="btn btn-outline-secondary btn-tool" onclick="addShape()"><i class="fas fa-square"></i> Arka Plan Kartı (Panel)</button>

<h5>TUVAL BOYUTU & BOYUTLANDIRMA</h5>
  <div class="control-group">
    <label>HAZIR SOSYAL MEDYA BOYUTLARI</label>
    <select id="presetSizeSelect" class="form-select form-select-sm mb-2" onchange="applyPresetSize(this.value)" style="background: #333; color: #fff; border-color: #444;">
      <option value="1080x1080">Instagram Gönderi / Kare (1080x1080)</option>
      <option value="1080x1920">Instagram Hikaye / Reels (1080x1920)</option>
      <option value="1280x720">YouTube Thumbnail / Yatay (1280x720)</option>
      <option value="1200x630">Facebook Gönderi (1200x630)</option>
      <option value="1200x675">X / Twitter Gönderi (1200x675)</option>
      <option value="custom">Özel Boyut...</option>
    </select>

    <div id="customSizeInputs" class="d-none mb-2">
      <div class="row g-2">
        <div class="col-6">
          <label>GENİŞLİK (px)</label>
          <input type="number" id="customWidthInput" class="form-control form-control-sm" value="1080" style="background: #333; color: #fff; border-color: #444;">
        </div>
        <div class="col-6">
          <label>YÜKSEKLİK (px)</label>
          <input type="number" id="customHeightInput" class="form-control form-control-sm" value="1080" style="background: #333; color: #fff; border-color: #444;">
        </div>
      </div>
      <button class="btn btn-sm btn-secondary w-100 mt-2" onclick="applyCustomSize()">Özel Boyutu Uygula</button>
    </div>

    <div class="form-check form-switch mt-2">
      <input class="form-check-input" type="checkbox" id="scaleElementsCheck" checked>
      <label class="form-check-label text-white" for="scaleElementsCheck" style="font-size: 0.75rem;">
        Öğeleri de orantılı olarak yeniden boyutlandır
      </label>
    </div>
  </div>


  <h5>YAZI & SLOGAN</h5>
  <button class="btn btn-warning btn-tool" onclick="addText('BEYKOZ\'DA FECİ KAZA!', 'news-text', 70)">Ana Başlık</button>
  <button class="btn btn-outline-warning btn-tool" onclick="addText('11 KİŞİ YARALANDI!', 'news-text yellow-text', 60)">Sarı Alt Başlık</button>
  <button class="btn btn-info btn-tool" onclick="addParagraph('BAŞLIK BURAYA', 'Açıklama veya haber detay metnini buraya yazabilirsiniz.')"><i class="fas fa-align-left"></i> Paragraf / Madde Ekle</button>
  <button class="btn btn-outline-info btn-tool" onclick="addQuote('Bu sistemi tamamen ücretsiz bir şekilde manşet oluşturulması için hazırladım.', '- Code Ebubekir Bastama')"><i class="fas fa-quote-left"></i> Alıntı Kutusu Ekle</button>

  <h5>SİMGELER</h5>
  <button class="btn btn-danger btn-tool mb-2" onclick="addSonDakika()">SON DAKİKA Paneli</button>
  
  <div class="dropdown mb-2">
    <button class="btn btn-dark btn-tool dropdown-toggle" type="button" id="iconDropdown" data-bs-toggle="dropdown" aria-expanded="false">
      <i class="fas fa-icons"></i> İkon Ekle
    </button>
    <ul class="dropdown-menu dropdown-menu-dark w-100" aria-labelledby="iconDropdown" style="max-height: 300px; overflow-y: auto;">
      <li><button class="dropdown-item" type="button" onclick="addIcon('fa-play-circle')"><i class="fas fa-play-circle me-2"></i> Video</button></li>
      <li><button class="dropdown-item" type="button" onclick="addIcon('fa-map-marker-alt')"><i class="fas fa-map-marker-alt me-2"></i> Konum</button></li>
      <li><button class="dropdown-item" type="button" onclick="addIcon('fa-exclamation-triangle')"><i class="fas fa-exclamation-triangle me-2"></i> Uyarı</button></li>
      <li><button class="dropdown-item" type="button" onclick="addIcon('fa-users')"><i class="fas fa-users me-2"></i> Katılım</button></li>
      <li><button class="dropdown-item" type="button" onclick="addIcon('fa-music')"><i class="fas fa-music me-2"></i> Müzik</button></li>
      <li><button class="dropdown-item" type="button" onclick="addIcon('fa-microphone')"><i class="fas fa-microphone me-2"></i> Mikrofon</button></li>
      <li><button class="dropdown-item" type="button" onclick="addIcon('fa-hands-clapping')"><i class="fas fa-hands-clapping me-2"></i> Alkış</button></li>
      <li><button class="dropdown-item" type="button" onclick="addIcon('fa-user-tie')"><i class="fas fa-user-tie me-2"></i> Protokol</button></li>
      <li><button class="dropdown-item" type="button" onclick="addIcon('fa-camera')"><i class="fas fa-camera me-2"></i> Fotoğraf Makinesi</button></li>
      <li><button class="dropdown-item" type="button" onclick="addIcon('fa-school')"><i class="fas fa-school me-2"></i> Okul / Bina</button></li>
      <li><button class="dropdown-item" type="button" onclick="addIcon('fa-chalkboard-teacher')"><i class="fas fa-chalkboard-teacher me-2"></i> Öğretmen / Toplantı</button></li>
      <li><button class="dropdown-item" type="button" onclick="addIcon('fa-handshake')"><i class="fas fa-handshake me-2"></i> İş Birliği</button></li>
    </ul>
  </div>

  <h5>DÜZENLEME (SEÇİLİ ÖĞE)</h5>
  <div class="control-group">
    <label>YATAY BÜKME (SKEW X)</label>
    <input type="range" id="skewXSlider" class="form-range" min="-45" max="45" value="0" oninput="updateTransformation()">
    
    <label>DİKEY BÜKME (SKEW Y)</label>
    <input type="range" id="skewYSlider" class="form-range" min="-45" max="45" value="0" oninput="updateTransformation()">
    
    <label>ÜST OVAL</label>
    <input type="range" id="radiusTopSlider" class="form-range" min="0" max="300" value="0" oninput="updateRadius(this.value, 'top')">
    
    <label>ALT OVAL</label>
    <input type="range" id="radiusBottomSlider" class="form-range" min="0" max="300" value="0" oninput="updateRadius(this.value, 'bottom')">

    <label>GENEL / BAŞLIK RENGİ</label>
    <input type="color" id="elementColorPicker" class="form-control form-control-color w-100 mb-2" value="#ffffff" oninput="updateElementColor(this.value)">
    
    <label id="descColorLabel" style="display:none;">PARAGRAF ALT METİN RENGİ</label>
    <input type="color" id="descColorPicker" class="form-control form-control-color w-100 mb-2" value="#e0e0e0" oninput="updateDescColor(this.value)" style="display:none;">

    <label>YAZI TİPİ (FONT)</label>
    <select id="fontFamilySelect" class="form-select form-select-sm mb-3" onchange="updateFontFamily(this.value)" style="background: #333; color: #fff; border-color: #444;">
      <option value="'Oswald', sans-serif">Oswald (Varsayılan)</option>
      <option value="'Anton', sans-serif">Anton (Haber Başlığı)</option>
      <option value="'Roboto Condensed', sans-serif">Roboto Condensed (İnce & Dar)</option>
      <option value="'Montserrat', sans-serif">Montserrat (Dengeli)</option>
      <option value="'Poppins', sans-serif">Poppins (Modern)</option>
      <option value="'Teko', sans-serif">Teko (Uzun & Sıkışık)</option>
    </select>
	
	<label>YAZI BOYUTU (FONT SIZE)</label>
    <div class="d-flex align-items-center gap-2 mb-3">
      <input type="range" id="fontSizeSlider" class="form-range" min="10" max="250" value="16" oninput="updateSelectedFontSize(this.value, 'slider')">
      <input type="number" id="fontSizeNumber" class="form-control form-control-sm" style="width: 75px; background: #333; color: #fff; border-color: #444;" min="10" max="250" value="16" oninput="updateSelectedFontSize(this.value, 'number')">
    </div>

<div id="sketchSettings" class="control-group" style="display: none; border: 1px solid #ffc107; padding: 12px; border-radius: 8px; background: rgba(255,193,7,0.05); margin-bottom: 15px;">
  <label style="color: #ffc107; font-weight: bold; margin-bottom: 8px; display: block;">🖌️ KURU BOYA / PASTEL AYARLARI</label>
  
  <div class="mb-2">
    <label style="font-size: 12px; color: #aaa;">Hazır Ayarlar (Presets)</label>
    <select id="sketchPreset" class="form-select form-select-sm" style="background: #333; color: #fff; border-color: #444;" onchange="applySketchPreset(this.value)">
      <option value="reference" selected>Örneğe yakın</option>
      <option value="soft">Yumuşak pastel</option>
      <option value="strong">Belirgin çizim</option>
      <option value="watercolor">Suluboya pastel</option>
      <option value="premium">Premium soft poster</option>
    </select>
  </div>

  <div class="mb-1" style="font-size: 12px; color: #ddd; border-top: 1px solid #444; padding-top: 5px; margin-top: 5px;"><b>RENK</b></div>
  <div class="d-flex align-items-center gap-1 mb-1">
    <span style="font-size: 11px; width: 65px; color: #bbb;">Pastel</span>
    <input type="range" id="sk_pastel" class="form-range" min="0" max="100" value="42" oninput="updateSketchParam()">
    <span id="sk_pastelV" style="font-size: 11px; width: 25px; text-align: right;">42</span>
  </div>
  <div class="d-flex align-items-center gap-1 mb-1">
    <span style="font-size: 11px; width: 65px; color: #bbb;">Poster</span>
    <input type="range" id="sk_poster" class="form-range" min="6" max="64" value="22" oninput="updateSketchParam()">
    <span id="sk_posterV" style="font-size: 11px; width: 25px; text-align: right;">22</span>
  </div>
  <div class="d-flex align-items-center gap-1 mb-1">
    <span style="font-size: 11px; width: 65px; color: #bbb;">Doygunluk</span>
    <input type="range" id="sk_sat" class="form-range" min="40" max="180" value="120" oninput="updateSketchParam()">
    <span id="sk_satV" style="font-size: 11px; width: 25px; text-align: right;">120</span>
  </div>
  <div class="d-flex align-items-center gap-1 mb-1">
    <span style="font-size: 11px; width: 65px; color: #bbb;">Işık</span>
    <input type="range" id="sk_bright" class="form-range" min="70" max="145" value="108" oninput="updateSketchParam()">
    <span id="sk_brightV" style="font-size: 11px; width: 25px; text-align: right;">108</span>
  </div>

  <div class="mb-1" style="font-size: 12px; color: #ddd; border-top: 1px solid #444; padding-top: 5px; margin-top: 5px;"><b>ÇİZGİ</b></div>
  <div class="d-flex align-items-center gap-1 mb-1">
    <span style="font-size: 11px; width: 65px; color: #bbb;">Kenar</span>
    <input type="range" id="sk_edge" class="form-range" min="0" max="100" value="74" oninput="updateSketchParam()">
    <span id="sk_edgeV" style="font-size: 11px; width: 25px; text-align: right;">74</span>
  </div>
  <div class="d-flex align-items-center gap-1 mb-1">
    <span style="font-size: 11px; width: 65px; color: #bbb;">İncelik</span>
    <input type="range" id="sk_thin" class="form-range" min="30" max="220" value="118" oninput="updateSketchParam()">
    <span id="sk_thinV" style="font-size: 11px; width: 25px; text-align: right;">118</span>
  </div>
  <div class="d-flex align-items-center gap-1 mb-1">
    <span style="font-size: 11px; width: 65px; color: #bbb;">Yumuşak</span>
    <input type="range" id="sk_smooth" class="form-range" min="0" max="4" value="1" oninput="updateSketchParam()">
    <span id="sk_smoothV" style="font-size: 11px; width: 25px; text-align: right;">1</span>
  </div>

  <div class="mb-1" style="font-size: 12px; color: #ddd; border-top: 1px solid #444; padding-top: 5px; margin-top: 5px;"><b>DOKU</b></div>
  <div class="d-flex align-items-center gap-1 mb-1">
    <span style="font-size: 11px; width: 65px; color: #bbb;">Kağıt</span>
    <input type="range" id="sk_texture" class="form-range" min="0" max="100" value="20" oninput="updateSketchParam()">
    <span id="sk_textureV" style="font-size: 11px; width: 25px; text-align: right;">20</span>
  </div>
  <div class="d-flex align-items-center gap-1 mb-1">
    <span style="font-size: 11px; width: 65px; color: #bbb;">Gren</span>
    <input type="range" id="sk_grain" class="form-range" min="0" max="80" value="12" oninput="updateSketchParam()">
    <span id="sk_grainV" style="font-size: 11px; width: 25px; text-align: right;">12</span>
  </div>
</div>
  </div>

  <div class="control-group">
    <label>HİZALAMA (Sadece Yazılar İçin)</label>
    <div class="btn-group w-100" role="group">
      <button type="button" class="btn btn-sm btn-outline-light" onclick="setTextAlign('left')"><i class="fas fa-align-left"></i></button>
      <button type="button" class="btn btn-sm btn-outline-light" onclick="setTextAlign('center')"><i class="fas fa-align-center"></i></button>
      <button type="button" class="btn btn-sm btn-outline-light" onclick="setTextAlign('right')"><i class="fas fa-align-right"></i></button>
    </div>
  </div>

  <div class="control-group d-flex gap-2">
    <button class="btn btn-sm btn-warning w-50" onclick="changeZ(1)">Öne</button>
    <button class="btn btn-sm btn-danger w-50" onclick="deleteSelected()">SİL</button>
  </div>

  <button class="btn btn-success btn-lg w-100 mt-3" onclick="save()">TASARIMI İNDİR</button>
</div>

<div class="main-content">
  <div id="canvasWrap"></div>
</div>

</body>
</html>
