<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EBS Image Blend Tool Online | Soft Merge Images</title>

<meta name="description" content="Blend two images online with smooth transitions. Free image blending tool with feather control, drag & drop support and instant preview.">
<meta name="keywords" content="image blend tool, merge images online, soft blend images, photo merge tool, feather mask tool, image mixer online">
<meta name="author" content="ebubekirbastama.com.tr">

<link rel="canonical" href="https://www.ebubekirbastama.com.tr/tools/image-blend-tool.html">

<style>
body {
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:#fff;
    text-align:center;
}

h1 { margin:20px 0; }

.wrapper {
    max-width:1000px;
    margin:auto;
    padding:20px;
}

.drop-area {
    border:2px dashed #aaa;
    border-radius:12px;
    padding:30px;
    margin:10px;
    transition:0.3s;
    cursor:pointer;
    user-select:none;
}

.drop-area:hover {
    border-color:#00d4ff;
    background:rgba(255,255,255,0.05);
}

.controls {
    margin-top:20px;
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:10px;
}

.control-box {
    background:rgba(255,255,255,0.1);
    padding:10px 15px;
    border-radius:10px;
}

input[type=range] { width:120px; }

select, button {
    padding:6px;
    border:none;
    border-radius:6px;
}

button {
    background:#00d4ff;
    color:#000;
    font-weight:bold;
    cursor:pointer;
}

canvas {
    margin-top:20px;
    border-radius:10px;
    max-width:100%;
    background:#000;
}

footer {
    margin-top:40px;
    font-size:14px;
    opacity:0.7;
}
</style>
</head>

<body>

<div class="wrapper">

<h1>🧩 Image Blend Tool</h1>
<p>Blend two images smoothly with feather transition. Drag & drop your images below or click to select.</p>

<div id="drop1" class="drop-area">📥 Drag & Drop First Image<br><small>veya tıklayıp seçin</small></div>
<input type="file" id="file1" accept="image/*" hidden>

<div id="drop2" class="drop-area">📥 Drag & Drop Second Image<br><small>veya tıklayıp seçin</small></div>
<input type="file" id="file2" accept="image/*" hidden>

<div class="controls">

<div class="control-box">
Feather<br>
<input type="range" id="feather" min="1" max="400" value="120">
</div>

<div class="control-box">
Position<br>
<input type="range" id="position" min="0" max="100" value="50">
</div>

<div class="control-box">
Direction<br>
<select id="direction">
<option value="horizontal">Horizontal</option>
<option value="vertical">Vertical</option>
</select>
</div>

<div class="control-box">
<br>
<button onclick="downloadImage()">Download</button>
</div>

</div>

<canvas id="canvas" width="900" height="550"></canvas>

</div>

<footer>
© 2026 ebubekirbastama.com.tr - Free Online Tools
</footer>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let img1 = new Image();
let img2 = new Image();

let loaded1 = false;
let loaded2 = false;

function loadImageFile(file, callback) {
    if (!file || !file.type.startsWith("image/")) return;

    const reader = new FileReader();
    reader.onload = ev => callback(ev.target.result);
    reader.readAsDataURL(file);
}

function setupDrop(element, inputElement, callback) {
    element.addEventListener("click", () => {
        inputElement.click();
    });

    inputElement.addEventListener("change", e => {
        const file = e.target.files[0];
        loadImageFile(file, callback);
        inputElement.value = "";
    });

    element.addEventListener("dragover", e => {
        e.preventDefault();
        element.style.borderColor = "#00d4ff";
    });

    element.addEventListener("dragleave", () => {
        element.style.borderColor = "#aaa";
    });

    element.addEventListener("drop", e => {
        e.preventDefault();
        element.style.borderColor = "#aaa";

        const file = e.dataTransfer.files[0];
        loadImageFile(file, callback);
    });
}

setupDrop(
    document.getElementById("drop1"),
    document.getElementById("file1"),
    src => {
        img1.src = src;
        img1.onload = () => { loaded1 = true; draw(); };
    }
);

setupDrop(
    document.getElementById("drop2"),
    document.getElementById("file2"),
    src => {
        img2.src = src;
        img2.onload = () => { loaded2 = true; draw(); };
    }
);

document.getElementById("feather").oninput = draw;
document.getElementById("position").oninput = draw;
document.getElementById("direction").onchange = draw;

function draw() {
    if (!loaded1 || !loaded2) return;

    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(img1, 0, 0, canvas.width, canvas.height);

    let feather = +document.getElementById("feather").value;
    let pos = +document.getElementById("position").value / 100;
    let dir = document.getElementById("direction").value;

    let gradient;

    if (dir === "horizontal") {
        let x = canvas.width * pos;
        gradient = ctx.createLinearGradient(x - feather, 0, x + feather, 0);
    } else {
        let y = canvas.height * pos;
        gradient = ctx.createLinearGradient(0, y - feather, 0, y + feather);
    }

    gradient.addColorStop(0, "rgba(0,0,0,1)");
    gradient.addColorStop(1, "rgba(0,0,0,0)");

    ctx.globalCompositeOperation = "destination-in";
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.globalCompositeOperation = "destination-over";
    ctx.drawImage(img2, 0, 0, canvas.width, canvas.height);

    ctx.globalCompositeOperation = "source-over";
}

function downloadImage() {
    let link = document.createElement("a");
    link.download = "image-blend.png";
    link.href = canvas.toDataURL();
    link.click();
}
</script>

</body>
</html>
