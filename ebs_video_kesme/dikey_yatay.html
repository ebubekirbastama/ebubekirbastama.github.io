<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1, viewport-fit=cover"
    >

    <title>EBS Blur Studio Pro | Profesyonel Video Dönüştürücü</title>

    <!-- SharedArrayBuffer güvenlik scripti -->
    <script src="coi-serviceworker.js"></script>

    <!-- Bootstrap 5 -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <!-- Font Awesome -->
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    >

    <style>
        :root {
            --page-bg: #081122;
            --page-bg-secondary: #101b34;

            --window-bg: rgba(12, 20, 38, 0.96);
            --header-bg: rgba(5, 10, 22, 0.98);
            --panel-bg: #111c32;
            --card-bg: #17243d;
            --input-bg: #0e192d;
            --preview-bg: #050a14;

            --accent: #26f59b;
            --accent-hover: #19db87;
            --accent-dark: #062818;
            --accent-glow: rgba(38, 245, 155, 0.24);

            --blue: #4da3ff;
            --danger: #ff6868;
            --warning: #ffc857;

            --text-main: #f5f7ff;
            --text-secondary: #d5dced;
            --text-muted: #aeb8ce;

            --border: rgba(181, 197, 225, 0.16);
            --border-strong: rgba(181, 197, 225, 0.28);

            --shadow: 0 28px 80px rgba(0, 0, 0, 0.48);
        }

        * {
            box-sizing: border-box;
        }

        html {
            min-height: 100%;
        }

        body {
            min-height: 100vh;
            margin: 0;
            color: var(--text-main);
            font-family:
                Inter,
                "Segoe UI",
                Tahoma,
                Geneva,
                Verdana,
                sans-serif;

            background:
                radial-gradient(
                    circle at top left,
                    rgba(45, 118, 255, 0.16),
                    transparent 38%
                ),
                radial-gradient(
                    circle at bottom right,
                    rgba(38, 245, 155, 0.11),
                    transparent 35%
                ),
                linear-gradient(
                    145deg,
                    var(--page-bg),
                    var(--page-bg-secondary)
                );

            overflow-x: hidden;
        }

        button,
        input,
        select {
            font-family: inherit;
        }

        .main-container {
            width: min(1500px, 100%);
            margin: 0 auto;
            padding: 28px 18px;
        }

        .app-window {
            position: relative;
            overflow: hidden;
            background: var(--window-bg);
            border: 1px solid var(--border);
            border-radius: 22px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(18px);
        }

        .app-window::before {
            position: absolute;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            content: "";
            background:
                linear-gradient(
                    135deg,
                    rgba(255, 255, 255, 0.025),
                    transparent 38%
                );
        }

        .app-header,
        .nav-tabs,
        .tab-content {
            position: relative;
            z-index: 1;
        }

        .app-header {
            min-height: 64px;
            padding: 14px 22px;

            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;

            background: var(--header-bg);
            border-bottom: 1px solid var(--border);
        }

        .window-dots {
            display: flex;
            align-items: center;
            gap: 7px;
        }

        .window-dots span {
            display: block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.06);
        }

        .dot-red {
            background: #ff6258;
        }

        .dot-yellow {
            background: #ffc248;
        }

        .dot-green {
            background: #34d65c;
        }

        .app-title {
            color: var(--text-secondary);
            font-size: 0.78rem;
            font-weight: 800;
            letter-spacing: 1.25px;
            text-align: center;
        }

        .app-title i {
            color: var(--accent);
        }

        .nav-tabs {
            padding: 10px 16px 0;
            border-bottom: 1px solid var(--border);
            gap: 6px;
        }

        .nav-tabs .nav-item {
            margin-bottom: 0;
        }

        .nav-tabs .nav-link {
            position: relative;

            min-height: 46px;
            padding: 11px 18px;

            color: var(--text-muted);
            background: transparent;
            border: 0;
            border-radius: 10px 10px 0 0;

            font-size: 0.84rem;
            font-weight: 800;
            letter-spacing: 0.35px;

            transition:
                color 0.2s ease,
                background-color 0.2s ease;
        }

        .nav-tabs .nav-link:hover {
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.035);
        }

        .nav-tabs .nav-link.active {
            color: var(--accent);
            background: rgba(38, 245, 155, 0.07);
        }

        .nav-tabs .nav-link.active::after {
            position: absolute;
            right: 14px;
            bottom: -1px;
            left: 14px;

            height: 3px;
            content: "";
            background: var(--accent);
            border-radius: 10px 10px 0 0;
            box-shadow: 0 0 16px var(--accent-glow);
        }

        .app-body {
            padding: 28px;
        }

        .controls-column {
            padding-right: 28px;
            border-right: 1px solid var(--border);
        }

        .preview-column {
            padding-left: 28px;
        }

        .form-label {
            margin-bottom: 8px;

            color: var(--text-secondary);
            font-size: 0.74rem;
            font-weight: 800;
            letter-spacing: 1.15px;
            text-transform: uppercase;
        }

        .form-control,
        .form-select {
            min-height: 46px;
            padding: 10px 13px;

            color: var(--text-main);
            background-color: var(--input-bg);
            border: 1px solid var(--border-strong);
            border-radius: 11px;

            font-size: 0.92rem;
            font-weight: 600;

            transition:
                border-color 0.2s ease,
                box-shadow 0.2s ease,
                background-color 0.2s ease;
        }

        .form-control:hover,
        .form-select:hover {
            border-color: rgba(38, 245, 155, 0.42);
        }

        .form-control:focus,
        .form-select:focus {
            color: var(--text-main);
            background-color: #111e35;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-glow);
        }

        .form-select option {
            color: var(--text-main);
            background: var(--panel-bg);
        }

        .file-upload-wrapper {
            position: relative;

            min-height: 46px;
            padding: 9px 14px;

            display: flex;
            align-items: center;
            justify-content: center;

            color: var(--accent);
            background:
                linear-gradient(
                    135deg,
                    rgba(38, 245, 155, 0.08),
                    rgba(77, 163, 255, 0.06)
                );

            border: 1px dashed rgba(38, 245, 155, 0.52);
            border-radius: 11px;

            cursor: pointer;

            transition:
                transform 0.2s ease,
                border-color 0.2s ease,
                background-color 0.2s ease;
        }

        .file-upload-wrapper:hover {
            transform: translateY(-1px);
            border-color: var(--accent);
            background:
                linear-gradient(
                    135deg,
                    rgba(38, 245, 155, 0.14),
                    rgba(77, 163, 255, 0.1)
                );
        }

        .file-upload-wrapper input[type="file"] {
            position: absolute;
            inset: 0;

            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .upload-label {
            color: var(--accent);
            font-size: 0.84rem;
            font-weight: 800;
            letter-spacing: 0.35px;
        }

        .video-queue {
            max-height: 430px;
            padding-right: 6px;
            overflow-y: auto;
            overscroll-behavior: contain;
        }

        .video-queue::-webkit-scrollbar {
            width: 7px;
        }

        .video-queue::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.025);
            border-radius: 20px;
        }

        .video-queue::-webkit-scrollbar-thumb {
            background: rgba(174, 184, 206, 0.32);
            border-radius: 20px;
        }

        .video-queue::-webkit-scrollbar-thumb:hover {
            background: rgba(38, 245, 155, 0.48);
        }

        .empty-state {
            min-height: 230px;
            padding: 45px 20px;

            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;

            color: var(--text-muted);
            background: rgba(255, 255, 255, 0.018);
            border: 1px dashed var(--border-strong);
            border-radius: 15px;

            font-size: 0.88rem;
            line-height: 1.6;
            text-align: center;
        }

        .empty-state i {
            margin-bottom: 12px;
            color: var(--accent);
            opacity: 0.8;
        }

        .video-card {
            position: relative;

            padding: 16px;
            margin-bottom: 12px;

            background:
                linear-gradient(
                    145deg,
                    rgba(27, 43, 71, 0.96),
                    rgba(18, 31, 53, 0.96)
                );

            border: 1px solid var(--border);
            border-radius: 14px;
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.16);

            transition:
                transform 0.2s ease,
                border-color 0.2s ease,
                box-shadow 0.2s ease;
        }

        .video-card:hover {
            transform: translateY(-1px);
            border-color: rgba(38, 245, 155, 0.34);
            box-shadow: 0 14px 30px rgba(0, 0, 0, 0.22);
        }

        .video-title {
            max-width: calc(100% - 45px);

            display: flex;
            align-items: flex-start;
            gap: 7px;

            color: var(--text-main);
            font-size: 0.9rem;
            font-weight: 750;
            line-height: 1.4;

            cursor: pointer;
            word-break: break-word;
        }

        .video-title:hover {
            color: var(--accent);
        }

        .video-title i {
            margin-top: 3px;
            color: var(--accent);
            flex: 0 0 auto;
        }

        .video-status {
            color: var(--text-secondary);
            font-size: 0.81rem;
        }

        .video-progress-text {
            color: var(--text-muted);
            font-size: 0.81rem;
            text-align: right;
        }

        .form-check-input {
            width: 19px;
            height: 19px;
            margin-top: 0;

            background-color: var(--input-bg);
            border: 1px solid var(--border-strong);
            cursor: pointer;
        }

        .form-check-input:checked {
            background-color: var(--accent);
            border-color: var(--accent);
        }

        .form-check-input:focus {
            box-shadow: 0 0 0 4px var(--accent-glow);
        }

        .progress {
            height: 9px;
            overflow: hidden;

            background-color: rgba(0, 0, 0, 0.35);
            border: 1px solid rgba(255, 255, 255, 0.035);
            border-radius: 20px;
        }

        .progress-bar {
            background:
                linear-gradient(
                    90deg,
                    var(--accent),
                    var(--blue)
                );

            border-radius: 20px;
            transition: width 0.3s ease;
        }

        .render-actions {
            display: flex;
            gap: 10px;
            margin-top: 24px;
        }

        .btn-accent {
            min-height: 47px;
            padding: 11px 17px;

            color: var(--accent-dark);
            background:
                linear-gradient(
                    135deg,
                    var(--accent),
                    #54ffb4
                );

            border: 0;
            border-radius: 11px;
            box-shadow: 0 7px 22px var(--accent-glow);

            font-size: 0.86rem;
            font-weight: 900;
            letter-spacing: 0.25px;

            transition:
                transform 0.2s ease,
                box-shadow 0.2s ease,
                filter 0.2s ease;
        }

        .btn-accent:hover:not(:disabled) {
            color: #03190f;
            transform: translateY(-2px);
            filter: brightness(1.04);
            box-shadow: 0 10px 28px rgba(38, 245, 155, 0.34);
        }

        .btn-accent:disabled {
            color: rgba(3, 25, 15, 0.7);
            opacity: 0.58;
        }

        .btn-outline-custom {
            min-height: 42px;
            padding: 9px 14px;

            color: var(--text-secondary);
            background: rgba(255, 255, 255, 0.025);
            border: 1px solid var(--border-strong);
            border-radius: 10px;

            font-size: 0.83rem;
            font-weight: 750;

            transition:
                color 0.2s ease,
                background-color 0.2s ease,
                border-color 0.2s ease,
                transform 0.2s ease;
        }

        .btn-outline-custom:hover {
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(38, 245, 155, 0.46);
            transform: translateY(-1px);
        }

        .btn-danger-custom {
            min-height: 42px;
            padding: 9px 14px;

            color: #ff8e8e;
            background: rgba(255, 104, 104, 0.08);
            border: 1px solid rgba(255, 104, 104, 0.65);
            border-radius: 10px;

            font-size: 0.83rem;
            font-weight: 800;

            transition:
                color 0.2s ease,
                background-color 0.2s ease,
                transform 0.2s ease;
        }

        .btn-danger-custom:hover {
            color: #190606;
            background: var(--danger);
            transform: translateY(-1px);
        }

        .preview-header {
            width: 100%;
            margin-bottom: 11px;
            padding: 0 2px;

            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .preview-title {
            color: var(--text-secondary);
            font-size: 0.73rem;
            font-weight: 850;
            letter-spacing: 0.9px;
            text-transform: uppercase;
        }

        .preview-box {
            position: relative;

            width: 100%;
            max-width: 100%;
            height: 260px;

            display: flex;
            align-items: center;
            justify-content: center;

            overflow: hidden;
            background:
                radial-gradient(
                    circle at center,
                    rgba(36, 55, 88, 0.4),
                    transparent 58%
                ),
                var(--preview-bg);

            border: 1px solid var(--border-strong);
            border-radius: 16px;
            box-shadow:
                inset 0 0 32px rgba(0, 0, 0, 0.35),
                0 15px 35px rgba(0, 0, 0, 0.24);

            transition:
                width 0.3s ease,
                height 0.3s ease;
        }

        .preview-box video {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }

        .preview-loading-overlay {
            position: absolute;
            inset: auto;

            z-index: 10;

            display: none;
            max-width: calc(100% - 30px);
            padding: 14px 20px;

            color: var(--accent);
            background: rgba(4, 10, 20, 0.93);
            border: 1px solid rgba(38, 245, 155, 0.32);
            border-radius: 11px;
            box-shadow: 0 14px 35px rgba(0, 0, 0, 0.4);

            font-size: 0.87rem;
            font-weight: 800;
            text-align: center;
        }

        .settings-card {
            max-width: 620px;
            padding: 26px;
            margin: 0 auto;

            background:
                linear-gradient(
                    145deg,
                    rgba(24, 39, 65, 0.82),
                    rgba(14, 25, 44, 0.82)
                );

            border: 1px solid var(--border);
            border-radius: 17px;
            box-shadow: 0 18px 45px rgba(0, 0, 0, 0.2);
        }

        @media (max-width: 991.98px) {
            .main-container {
                padding: 18px 12px;
            }

            .app-body {
                padding: 22px 18px;
            }

            .controls-column {
                padding-right: calc(var(--bs-gutter-x) * 0.5);
                padding-bottom: 26px;

                border-right: 0;
                border-bottom: 1px solid var(--border);
            }

            .preview-column {
                padding-top: 25px;
                padding-left: calc(var(--bs-gutter-x) * 0.5);
            }

            .preview-box {
                margin-right: auto;
                margin-left: auto;
            }
        }

        @media (max-width: 767.98px) {
            .main-container {
                padding: 10px 8px;
            }

            .app-window {
                border-radius: 16px;
            }

            .app-header {
                min-height: 58px;
                padding: 12px 14px;
                grid-template-columns: auto 1fr;
            }

            .app-header > div:last-child {
                display: none;
            }

            .window-dots span {
                width: 10px;
                height: 10px;
            }

            .app-title {
                padding-left: 12px;
                font-size: 0.68rem;
                letter-spacing: 0.65px;
                text-align: right;
            }

            .nav-tabs {
                padding: 8px 8px 0;
                flex-wrap: nowrap;
            }

            .nav-tabs .nav-item {
                flex: 1 1 50%;
            }

            .nav-tabs .nav-link {
                width: 100%;
                min-height: 48px;
                padding: 9px 7px;

                display: flex;
                align-items: center;
                justify-content: center;
                gap: 5px;

                font-size: 0.72rem;
                white-space: nowrap;
            }

            .app-body {
                padding: 18px 13px;
            }

            .video-queue {
                max-height: 370px;
                padding-right: 2px;
            }

            .video-card {
                padding: 14px 12px;
            }

            .video-title {
                max-width: calc(100% - 34px);
                font-size: 0.84rem;
            }

            .video-info-row {
                row-gap: 7px;
            }

            .video-status,
            .video-progress-text {
                font-size: 0.76rem;
            }

            .render-actions {
                flex-direction: column;
            }

            .render-actions > button {
                width: 100%;
            }

            .btn-accent,
            .btn-outline-custom,
            .btn-danger-custom {
                min-height: 46px;
            }

            .preview-header {
                align-items: flex-start;
            }

            .preview-title {
                max-width: calc(100% - 90px);
                font-size: 0.67rem;
                line-height: 1.4;
            }

            .preview-box {
                width: 100%;
                height: 230px;
                border-radius: 13px;
            }

            .settings-card {
                padding: 19px 15px;
            }
        }

        @media (max-width: 420px) {
            .app-title {
                font-size: 0.61rem;
            }

            .nav-tabs .nav-link {
                font-size: 0.66rem;
            }

            .form-label {
                font-size: 0.68rem;
            }

            .file-upload-wrapper {
                min-height: 48px;
            }

            .upload-label {
                font-size: 0.79rem;
            }

            .preview-title {
                font-size: 0.62rem;
            }
        }
    </style>
</head>

<body>

<main class="main-container">
    <div class="app-window">

        <!-- Üst başlık -->
        <header class="app-header">
            <div class="window-dots" aria-hidden="true">
                <span class="dot-red"></span>
                <span class="dot-yellow"></span>
                <span class="dot-green"></span>
            </div>

            <div class="app-title text-uppercase">
                <i class="fa-solid fa-film me-1"></i>
                EBS Blur Studio Pro v2.5.0
            </div>

            <div></div>
        </header>

        <!-- Sekmeler -->
        <ul
            class="nav nav-tabs"
            id="studioTabs"
            role="tablist"
        >
            <li class="nav-item" role="presentation">
                <button
                    class="nav-link active"
                    id="main-tab"
                    data-bs-toggle="tab"
                    data-bs-target="#mainPanel"
                    type="button"
                    role="tab"
                    aria-controls="mainPanel"
                    aria-selected="true"
                >
                    <i class="fa-solid fa-clapperboard"></i>
                    ANA EKRAN
                </button>
            </li>

            <li class="nav-item" role="presentation">
                <button
                    class="nav-link"
                    id="settings-tab"
                    data-bs-toggle="tab"
                    data-bs-target="#settingsPanel"
                    type="button"
                    role="tab"
                    aria-controls="settingsPanel"
                    aria-selected="false"
                >
                    <i class="fa-solid fa-sliders"></i>
                    RENDER AYARLARI
                </button>
            </li>
        </ul>

        <!-- İçerik -->
        <div class="tab-content app-body" id="studioTabsContent">

            <!-- Ana ekran -->
            <section
                class="tab-pane fade show active"
                id="mainPanel"
                role="tabpanel"
                aria-labelledby="main-tab"
                tabindex="0"
            >
                <div class="row g-4">

                    <!-- Sol bölüm -->
                    <div class="col-lg-7 controls-column">
                        <div class="row g-3 mb-3">

                            <div class="col-md-6">
                                <label
                                    class="form-label"
                                    for="modeSelector"
                                >
                                    Kadraj modu
                                </label>

                                <select
                                    id="modeSelector"
                                    class="form-select"
                                >
                                    <option value="vertical" selected>
                                        📱 Dikey 9:16
                                    </option>

                                    <option value="horizontal">
                                        🖥️ Yatay 16:9
                                    </option>
                                </select>
                            </div>

                            <div class="col-md-6 d-flex align-items-end">
                                <div class="file-upload-wrapper w-100">
                                    <span class="upload-label">
                                        <i class="fa-solid fa-folder-open me-1"></i>
                                        VİDEO EKLE
                                    </span>

                                    <input
                                        type="file"
                                        id="videoInput"
                                        multiple
                                        accept="video/*"
                                        aria-label="Video dosyası ekle"
                                    >
                                </div>
                            </div>
                        </div>

                        <!-- Video kuyruğu -->
                        <div
                            id="videoQueueContainer"
                            class="video-queue"
                        >
                            <div
                                class="empty-state"
                                id="emptyState"
                            >
                                <i class="fa-solid fa-inbox fa-2x"></i>

                                <span>
                                    İşlem sırasına eklenmiş medya dosyası
                                    bulunmuyor.
                                </span>
                            </div>
                        </div>

                        <!-- Render butonları -->
                        <div class="render-actions">
                            <button
                                type="button"
                                id="renderAllBtn"
                                class="btn btn-accent flex-grow-1"
                            >
                                <i class="fa-solid fa-play me-1"></i>
                                TÜMÜNÜ RENDER AL
                            </button>

                            <button
                                type="button"
                                id="renderSelBtn"
                                class="btn btn-outline-custom"
                            >
                                <i class="fa-solid fa-check-double me-1"></i>
                                SEÇİLENLERİ İŞLE
                            </button>

                            <button
                                type="button"
                                id="stopBtn"
                                class="btn btn-danger-custom"
                            >
                                <i class="fa-solid fa-stop me-1"></i>
                                DURDUR
                            </button>
                        </div>
                    </div>

                    <!-- Sağ önizleme -->
                    <div
                        class="col-lg-5 preview-column d-flex flex-column align-items-center justify-content-start"
                    >
                        <div class="preview-header">
                            <span class="preview-title">
                                <i class="fa-solid fa-tv me-1"></i>
                                Efektli canlı önizleme
                            </span>

                            <div class="btn-group">
                                <button
                                    id="audioToggleBtn"
                                    type="button"
                                    class="btn btn-outline-custom py-1 px-2"
                                    title="Sesi aç veya kapat"
                                    aria-label="Sesi aç veya kapat"
                                >
                                    <i class="fa-solid fa-volume-high"></i>
                                </button>

                                <button
                                    id="stopPreviewBtn"
                                    type="button"
                                    class="btn btn-outline-custom py-1 px-2"
                                    title="Önizlemeyi kapat"
                                    aria-label="Önizlemeyi kapat"
                                >
                                    <i class="fa-solid fa-xmark"></i>
                                </button>
                            </div>
                        </div>

                        <div
                            class="preview-box"
                            id="previewContainer"
                        >
                            <div
                                id="previewLoader"
                                class="preview-loading-overlay"
                            >
                                <i class="fa-solid fa-spinner fa-spin me-2"></i>
                                Efekt hesaplanıyor...
                            </div>

                            <video
                                id="mainVideoPlayer"
                                controls
                                autoplay
                                loop
                                playsinline
                            ></video>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Render ayarları -->
            <section
                class="tab-pane fade"
                id="settingsPanel"
                role="tabpanel"
                aria-labelledby="settings-tab"
                tabindex="0"
            >
                <div class="settings-card">
                    <div class="row g-4">

                        <div class="col-12">
                            <label
                                class="form-label"
                                for="crfValue"
                            >
                                <i class="fa-solid fa-sliders me-1"></i>
                                CRF kalite oranı
                            </label>

                            <input
                                type="number"
                                id="crfValue"
                                class="form-control"
                                min="10"
                                max="40"
                                value="23"
                            >
                        </div>

                        <div class="col-12">
                            <label
                                class="form-label"
                                for="presetSelect"
                            >
                                <i class="fa-solid fa-gauge-high me-1"></i>
                                Hız ayarı
                            </label>

                            <select
                                id="presetSelect"
                                class="form-select"
                            >
                                <option value="ultrafast" selected>
                                    Ultrafast — En hızlı
                                </option>

                                <option value="superfast">
                                    Superfast
                                </option>

                                <option value="veryfast">
                                    Veryfast
                                </option>
                            </select>
                        </div>

                        <div class="col-12">
                            <label
                                class="form-label"
                                for="resSelect"
                            >
                                <i class="fa-solid fa-display me-1"></i>
                                Hedef çözünürlük
                            </label>

                            <select
                                id="resSelect"
                                class="form-select"
                            >
                                <option value="720p" selected>
                                    720p HD — Hızlı
                                </option>

                                <option value="1080p">
                                    1080p Full HD
                                </option>
                            </select>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </div>
</main>

<!-- Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- FFmpeg -->
<script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.0/dist/ffmpeg.min.js"></script>

<script>
    const { createFFmpeg, fetchFile } = FFmpeg;

    let ffmpeg = null;
    let selectedFilesList = [];
    let isMuted = false;
    let currentProcessingIndex = null;
    let durationInSeconds = 0;
    let currentPreviewUrl = null;

    const modeSelector = document.getElementById("modeSelector");
    const previewContainer = document.getElementById("previewContainer");
    const videoInput = document.getElementById("videoInput");
    const videoQueueContainer = document.getElementById(
        "videoQueueContainer"
    );
    const emptyState = document.getElementById("emptyState");
    const mainVideoPlayer = document.getElementById("mainVideoPlayer");
    const previewLoader = document.getElementById("previewLoader");
    const stopPreviewBtn = document.getElementById("stopPreviewBtn");
    const audioToggleBtn = document.getElementById("audioToggleBtn");
    const renderAllBtn = document.getElementById("renderAllBtn");
    const renderSelBtn = document.getElementById("renderSelBtn");
    const stopBtn = document.getElementById("stopBtn");

    /**
     * Önizleme alanını seçilen kadraj oranına göre günceller.
     */
    function adjustPreviewBox(mode) {
        const isMobile = window.innerWidth < 768;

        if (mode === "vertical") {
            previewContainer.style.width = isMobile
                ? "min(100%, 290px)"
                : "250px";

            previewContainer.style.height = isMobile
                ? "470px"
                : "440px";
        } else {
            previewContainer.style.width = "100%";
            previewContainer.style.height = isMobile
                ? "230px"
                : "260px";
        }
    }

    adjustPreviewBox(modeSelector.value);

    modeSelector.addEventListener("change", (event) => {
        adjustPreviewBox(event.target.value);
    });

    window.addEventListener("resize", () => {
        adjustPreviewBox(modeSelector.value);
    });

    /**
     * HTML içine güvenli metin eklemek için kullanılır.
     */
    function escapeHtml(value) {
        const div = document.createElement("div");
        div.textContent = value;
        return div.innerHTML;
    }

    /**
     * Dosya seçildiğinde video kartlarını oluşturur.
     */
    videoInput.addEventListener("change", (event) => {
        const files = event.target.files;

        if (!files || files.length === 0) {
            return;
        }

        emptyState.classList.add("d-none");

        for (let i = 0; i < files.length; i++) {
            const file = files[i];

            if (!file.type.startsWith("video/")) {
                continue;
            }

            selectedFilesList.push(file);

            const index = selectedFilesList.length - 1;
            const safeFileName = escapeHtml(file.name);

            const card = document.createElement("div");
            card.className = "video-card";
            card.id = `video-card-${index}`;

            card.innerHTML = `
                <div class="d-flex justify-content-between align-items-start gap-3 mb-3">
                    <button
                        type="button"
                        class="video-title bg-transparent border-0 p-0 text-start"
                        onclick="generate5SecPreview(${index})"
                        title="Önizleme oluştur"
                    >
                        <i class="fa-solid fa-wand-magic-sparkles"></i>
                        <span>${safeFileName}</span>
                    </button>

                    <input
                        type="checkbox"
                        class="form-check-input render-checksum flex-shrink-0"
                        data-index="${index}"
                        checked
                        aria-label="${safeFileName} dosyasını seç"
                    >
                </div>

                <div class="row video-info-row g-2 mb-2">
                    <div
                        class="col-12 col-sm-6 video-status"
                        id="status-${index}"
                    >
                        <i class="fa-regular fa-clock me-1"></i>
                        Sıraya alındı
                    </div>

                    <div
                        class="col-12 col-sm-6 video-progress-text"
                        id="eta-${index}"
                    >
                        İlerleme: %0
                    </div>
                </div>

                <div class="progress mb-3">
                    <div
                        id="progress-bar-${index}"
                        class="progress-bar"
                        role="progressbar"
                        style="width: 0%"
                        aria-valuemin="0"
                        aria-valuemax="100"
                        aria-valuenow="0"
                    ></div>
                </div>

                <div class="d-flex flex-wrap gap-2 justify-content-end">
                    <a
                        class="btn btn-sm btn-outline-custom d-none"
                        id="folder-btn-${index}"
                    >
                        <i class="fa-solid fa-download me-1"></i>
                        İndir
                    </a>

                    <button
                        type="button"
                        class="btn btn-sm btn-outline-custom d-none"
                        id="retry-btn-${index}"
                        onclick="reRenderTrack(${index})"
                    >
                        <i class="fa-solid fa-rotate-right me-1"></i>
                        Tekrar işle
                    </button>
                </div>
            `;

            videoQueueContainer.appendChild(card);
        }

        /*
         * Aynı dosyanın tekrar seçilebilmesi için
         * input değeri temizlenir.
         */
        videoInput.value = "";
    });

    /**
     * FFmpeg örneğini başlatır.
     */
    async function initializeFFmpeg(enableLogs = false) {
        if (ffmpeg) {
            return;
        }

        ffmpeg = createFFmpeg({
            log: enableLogs
        });

        if (enableLogs) {
            ffmpeg.setLogger(({ message }) => {
                parseFFmpegLog(message);
            });
        }

        await ffmpeg.load();
    }

    /**
     * FFmpeg geçici dosyasını güvenli biçimde siler.
     */
    function safeUnlink(fileName) {
        if (!ffmpeg) {
            return;
        }

        try {
            ffmpeg.FS("unlink", fileName);
        } catch (error) {
            // Dosya mevcut değilse işlem yapılmaz.
        }
    }

    /**
     * Seçilen videonun ilk 5 saniyesini efektli biçimde hazırlar.
     */
    async function generate5SecPreview(index) {
        const file = selectedFilesList[index];

        if (!file) {
            alert("Video dosyası bulunamadı.");
            return;
        }

        previewLoader.style.display = "block";
        mainVideoPlayer.pause();

        try {
            await initializeFFmpeg(false);

            const mode = modeSelector.value;

            let width = 1280;
            let height = 720;

            if (mode === "vertical") {
                width = 720;
                height = 1280;
            }

            const inputName = `preview_input_${index}`;
            const outputName = `preview_output_${index}.mp4`;

            safeUnlink(inputName);
            safeUnlink(outputName);

            ffmpeg.FS(
                "writeFile",
                inputName,
                await fetchFile(file)
            );

            const filterStr =
                `[0:v]` +
                `scale=${width}:${height}:force_original_aspect_ratio=increase,` +
                `crop=${width}:${height},` +
                `boxblur=40:2[bg];` +
                `[0:v]` +
                `scale=${width}:${height}:force_original_aspect_ratio=decrease,` +
                `scale='trunc(iw/2)*2':'trunc(ih/2)*2'[fg];` +
                `[bg][fg]` +
                `overlay=(W-w)/2:(H-h)/2:shortest=1`;

            await ffmpeg.run(
                "-y",
                "-ss",
                "00:00:00",
                "-i",
                inputName,
                "-t",
                "5",
                "-filter_complex",
                filterStr,
                "-c:v",
                "libx264",
                "-preset",
                "ultrafast",
                "-crf",
                "26",
                "-an",
                outputName
            );

            const data = ffmpeg.FS("readFile", outputName);

            const blob = new Blob(
                [data.buffer],
                { type: "video/mp4" }
            );

            if (currentPreviewUrl) {
                URL.revokeObjectURL(currentPreviewUrl);
            }

            currentPreviewUrl = URL.createObjectURL(blob);
            mainVideoPlayer.src = currentPreviewUrl;

            await mainVideoPlayer.play().catch(() => {
                /*
                 * Bazı mobil tarayıcılar otomatik oynatmayı
                 * engelleyebilir. Kullanıcı oynat tuşuna basabilir.
                 */
            });

            safeUnlink(inputName);
            safeUnlink(outputName);
        } catch (error) {
            console.error("Önizleme hatası:", error);

            alert(
                "Önizleme oluşturulamadı. Tarayıcı konsolunu kontrol edin."
            );
        } finally {
            previewLoader.style.display = "none";
        }
    }

    /**
     * Önizlemeyi durdurur ve belleği temizler.
     */
    stopPreviewBtn.addEventListener("click", () => {
        mainVideoPlayer.pause();
        mainVideoPlayer.removeAttribute("src");
        mainVideoPlayer.load();

        if (currentPreviewUrl) {
            URL.revokeObjectURL(currentPreviewUrl);
            currentPreviewUrl = null;
        }
    });

    /**
     * Önizleme sesini açar veya kapatır.
     */
    audioToggleBtn.addEventListener("click", () => {
        isMuted = !isMuted;
        mainVideoPlayer.muted = isMuted;

        audioToggleBtn.innerHTML = isMuted
            ? `<i class="fa-solid fa-volume-xmark text-danger"></i>`
            : `<i class="fa-solid fa-volume-high"></i>`;
    });

    /**
     * FFmpeg konsol çıktısından ilerleme yüzdesini hesaplar.
     */
    function parseFFmpegLog(message) {
        if (currentProcessingIndex === null) {
            return;
        }

        if (message.includes("Duration:")) {
            const match = message.match(
                /Duration: (\d+):(\d+):(\d+)\.(\d+)/
            );

            if (match) {
                const hours = Number.parseInt(match[1], 10);
                const minutes = Number.parseInt(match[2], 10);
                const seconds = Number.parseInt(match[3], 10);

                durationInSeconds =
                    (hours * 3600) +
                    (minutes * 60) +
                    seconds;
            }
        }

        if (message.includes("time=")) {
            const match = message.match(
                /time=(\d+):(\d+):(\d+)\.(\d+)/
            );

            if (match && durationInSeconds > 0) {
                const hours = Number.parseInt(match[1], 10);
                const minutes = Number.parseInt(match[2], 10);
                const seconds = Number.parseInt(match[3], 10);

                const currentTime =
                    (hours * 3600) +
                    (minutes * 60) +
                    seconds;

                let percent = Math.round(
                    (currentTime / durationInSeconds) * 100
                );

                percent = Math.min(percent, 99);

                updateProgress(
                    currentProcessingIndex,
                    percent
                );
            }
        }
    }

    /**
     * İlerleme çubuğunu ve metnini günceller.
     */
    function updateProgress(index, percent) {
        const progressBar = document.getElementById(
            `progress-bar-${index}`
        );

        const etaLabel = document.getElementById(
            `eta-${index}`
        );

        if (progressBar) {
            progressBar.style.width = `${percent}%`;
            progressBar.setAttribute(
                "aria-valuenow",
                String(percent)
            );
        }

        if (etaLabel) {
            etaLabel.textContent = `İlerleme: %${percent}`;
        }
    }

    /**
     * Ana render motoru.
     */
    async function runRenderEngine(targetIndices) {
        if (!Array.isArray(targetIndices) || targetIndices.length === 0) {
            alert("İşlem yapılacak dosya seçilmedi.");
            return;
        }

        renderAllBtn.disabled = true;
        renderSelBtn.disabled = true;

        try {
            await initializeFFmpeg(true);

            const mode = modeSelector.value;
            const crf = document.getElementById("crfValue").value;
            const preset = document.getElementById(
                "presetSelect"
            ).value;
            const resolution = document.getElementById(
                "resSelect"
            ).value;

            let width = 1920;
            let height = 1080;

            if (resolution === "720p") {
                width = 1280;
                height = 720;
            }

            if (mode === "vertical") {
                [width, height] = [height, width];
            }

            for (const index of targetIndices) {
                const file = selectedFilesList[index];

                if (!file) {
                    continue;
                }

                currentProcessingIndex = index;
                durationInSeconds = 0;

                const statusLabel = document.getElementById(
                    `status-${index}`
                );

                const downloadBtn = document.getElementById(
                    `folder-btn-${index}`
                );

                const retryBtn = document.getElementById(
                    `retry-btn-${index}`
                );

                if (statusLabel) {
                    statusLabel.innerHTML = `
                        <i class="fa-solid fa-spinner fa-spin me-1"></i>
                        İşleniyor...
                    `;
                }

                updateProgress(index, 5);

                const inputName = `input_track_${index}`;
                const outputName =
                    `EBS_Blurred_${index}_${Date.now()}.mp4`;

                safeUnlink(inputName);
                safeUnlink(outputName);

                try {
                    ffmpeg.FS(
                        "writeFile",
                        inputName,
                        await fetchFile(file)
                    );

                    const filterStr =
                        `[0:v]` +
                        `scale=${width}:${height}:force_original_aspect_ratio=increase,` +
                        `crop=${width}:${height},` +
                        `boxblur=40:2[bg];` +
                        `[0:v]` +
                        `scale=${width}:${height}:force_original_aspect_ratio=decrease,` +
                        `scale='trunc(iw/2)*2':'trunc(ih/2)*2'[fg];` +
                        `[bg][fg]` +
                        `overlay=(W-w)/2:(H-h)/2:shortest=1`;

                    await ffmpeg.run(
                        "-y",
                        "-i",
                        inputName,
                        "-filter_complex",
                        filterStr,
                        "-c:v",
                        "libx264",
                        "-preset",
                        preset,
                        "-crf",
                        String(crf),

                        /*
                         * Tarayıcı uyumluluğu açısından sesi AAC olarak
                         * kodlamak, her giriş dosyasında "-c:a copy"
                         * kullanmaktan daha güvenlidir.
                         */
                        "-c:a",
                        "aac",
                        "-b:a",
                        "192k",

                        "-movflags",
                        "+faststart",
                        outputName
                    );

                    updateProgress(index, 100);

                    if (statusLabel) {
                        statusLabel.innerHTML = `
                            <i class="fa-solid fa-circle-check text-success me-1"></i>
                            Tamamlandı
                        `;
                    }

                    const data = ffmpeg.FS(
                        "readFile",
                        outputName
                    );

                    const blob = new Blob(
                        [data.buffer],
                        { type: "video/mp4" }
                    );

                    const downloadUrl = URL.createObjectURL(blob);

                    if (downloadBtn) {
                        downloadBtn.classList.remove("d-none");
                        downloadBtn.href = downloadUrl;
                        downloadBtn.download =
                            `EBS_Blurred_${file.name}`;
                    }

                    if (retryBtn) {
                        retryBtn.classList.remove("d-none");
                    }
                } catch (error) {
                    console.error("Render hatası:", error);

                    if (statusLabel) {
                        statusLabel.innerHTML = `
                            <i class="fa-solid fa-circle-xmark text-danger me-1"></i>
                            Hata oluştu
                        `;
                    }

                    if (retryBtn) {
                        retryBtn.classList.remove("d-none");
                    }
                } finally {
                    safeUnlink(inputName);
                    safeUnlink(outputName);
                }
            }
        } catch (error) {
            console.error("FFmpeg başlatma hatası:", error);

            alert(
                "Video motoru başlatılamadı. SharedArrayBuffer ve sunucu güvenlik başlıklarını kontrol edin."
            );
        } finally {
            currentProcessingIndex = null;
            renderAllBtn.disabled = false;
            renderSelBtn.disabled = false;
        }
    }

    renderAllBtn.addEventListener("click", () => {
        const allIndices = selectedFilesList.map(
            (_, index) => index
        );

        runRenderEngine(allIndices);
    });

    renderSelBtn.addEventListener("click", () => {
        const checkboxes = document.querySelectorAll(
            ".render-checksum"
        );

        const targetIndices = [];

        checkboxes.forEach((checkbox) => {
            if (checkbox.checked) {
                targetIndices.push(
                    Number.parseInt(
                        checkbox.getAttribute("data-index"),
                        10
                    )
                );
            }
        });

        runRenderEngine(targetIndices);
    });

    stopBtn.addEventListener("click", () => {
        const confirmed = window.confirm(
            "Devam eden işlemler durdurulacak ve sayfa yenilenecek. Devam edilsin mi?"
        );

        if (confirmed) {
            window.location.reload();
        }
    });

    function reRenderTrack(index) {
        runRenderEngine([index]);
    }

    /*
     * HTML içindeki onclick fonksiyonlarının erişebilmesi için
     * fonksiyonlar window nesnesine aktarılır.
     */
    window.generate5SecPreview = generate5SecPreview;
    window.reRenderTrack = reRenderTrack;
</script>

</body>
</html>
