<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Canlı Ses Yazıya Çevirici</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body{
      min-height:100vh;
      background:
        radial-gradient(circle at top left, rgba(0,123,255,.25), transparent 35%),
        linear-gradient(135deg,#07111f,#111827 45%,#020617);
      color:#fff;
      font-family:Inter,system-ui,Arial,sans-serif;
    }
    .glass{
      background:rgba(255,255,255,.09);
      border:1px solid rgba(255,255,255,.15);
      backdrop-filter:blur(18px);
      box-shadow:0 25px 80px rgba(0,0,0,.35);
      border-radius:28px;
    }
    .hero-title{
      font-size:clamp(28px,5vw,56px);
      font-weight:900;
      letter-spacing:-1.5px;
    }
    .status-dot{
      width:12px;height:12px;border-radius:50%;
      background:#ef4444;display:inline-block;
    }
    .status-dot.active{
      background:#22c55e;
      box-shadow:0 0 20px #22c55e;
    }
    .transcript{
      min-height:340px;
      max-height:520px;
      overflow:auto;
      background:rgba(2,6,23,.7);
      border-radius:22px;
      padding:22px;
      line-height:1.75;
      font-size:17px;
      border:1px solid rgba(255,255,255,.1);
      white-space:pre-wrap;
    }
    .btn-elite{
      border-radius:16px;
      padding:13px 18px;
      font-weight:700;
    }
    .small-muted{color:#aab4c5}
    .form-select,.form-control{
      background:rgba(255,255,255,.08)!important;
      color:#fff!important;
      border-color:rgba(255,255,255,.18)!important;
      border-radius:15px;
    }
    .form-select option{color:#111}
  </style>
</head>

<body>
<div class="container py-4 py-lg-5">

  <div class="row justify-content-center">
    <div class="col-12 col-xl-10">

      <div class="text-center mb-4">
        <div class="badge rounded-pill text-bg-primary px-3 py-2 mb-3">
          <i class="bi bi-soundwave"></i> Whisper Canlı Transkript
        </div>
        <h1 class="hero-title">Ortam Sesini Anlık Yazıya Çevir</h1>
        <p class="small-muted mb-0">
          Mikrofonu aç, sayfa açık kaldığı sürece ses parçaları yazıya çevrilsin.
        </p>
      </div>

      <div class="glass p-3 p-md-4 p-lg-5">

        <div class="row g-3 mb-4">
          <div class="col-12 col-md-4">
            <label class="form-label small-muted">Model</label>
            <select id="modelSelect" class="form-select">
              <option value="Xenova/whisper-tiny">Tiny - hızlı</option>
              <option value="Xenova/whisper-base" selected>Base - önerilen</option>
              <option value="Xenova/whisper-small">Small - daha doğru/yavaş</option>
            </select>
          </div>

          <div class="col-12 col-md-4">
            <label class="form-label small-muted">Dil</label>
            <select id="langSelect" class="form-select">
              <option value="turkish" selected>Türkçe</option>
              <option value="english">İngilizce</option>
              <option value="auto">Otomatik</option>
            </select>
          </div>

          <div class="col-12 col-md-4">
            <label class="form-label small-muted">Parça Süresi</label>
            <select id="chunkSelect" class="form-select">
              <option value="4000">4 saniye</option>
              <option value="6000" selected>6 saniye</option>
              <option value="10000">10 saniye</option>
            </select>
          </div>
        </div>

        <div class="d-flex flex-wrap gap-2 mb-4">
          <button id="startBtn" class="btn btn-success btn-elite">
            <i class="bi bi-mic-fill"></i> Başlat
          </button>

          <button id="stopBtn" class="btn btn-danger btn-elite" disabled>
            <i class="bi bi-stop-fill"></i> Durdur
          </button>

          <button id="clearBtn" class="btn btn-outline-light btn-elite">
            <i class="bi bi-trash3"></i> Temizle
          </button>

          <button id="txtBtn" class="btn btn-primary btn-elite">
            <i class="bi bi-download"></i> TXT İndir
          </button>

          <button id="wordBtn" class="btn btn-info btn-elite text-white">
            <i class="bi bi-file-earmark-word"></i> Word İndir
          </button>

          <button id="pdfBtn" class="btn btn-warning btn-elite">
            <i class="bi bi-file-earmark-pdf"></i> PDF Yazdır
          </button>
        </div>

        <div class="d-flex align-items-center gap-2 mb-3">
          <span id="statusDot" class="status-dot"></span>
          <strong id="statusText">Hazır</strong>
        </div>

        <div id="transcript" class="transcript">
Canlı transkript burada görünecek...
        </div>

        <div class="mt-3 small-muted">
          Not: İlk çalıştırmada Whisper modeli indirileceği için birkaç dakika sürebilir. GitHub Pages üzerinde çalışır.
        </div>

      </div>
    </div>
  </div>
</div>

<script type="module">
import { pipeline, env } from "https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2";

env.allowLocalModels = false;

let transcriber = null;
let mediaRecorder = null;
let stream = null;
let isRunning = false;
let isProcessing = false;
let fullText = "";

const startBtn = document.getElementById("startBtn");
const stopBtn = document.getElementById("stopBtn");
const clearBtn = document.getElementById("clearBtn");
const txtBtn = document.getElementById("txtBtn");
const wordBtn = document.getElementById("wordBtn");
const pdfBtn = document.getElementById("pdfBtn");
const transcriptBox = document.getElementById("transcript");
const statusText = document.getElementById("statusText");
const statusDot = document.getElementById("statusDot");
const modelSelect = document.getElementById("modelSelect");
const langSelect = document.getElementById("langSelect");
const chunkSelect = document.getElementById("chunkSelect");

function setStatus(text, active=false){
  statusText.textContent = text;
  statusDot.classList.toggle("active", active);
}

function timeNow(){
  return new Date().toLocaleTimeString("tr-TR", {
    hour:"2-digit",
    minute:"2-digit",
    second:"2-digit"
  });
}

async function loadModel(){
  if(transcriber) return;

  setStatus("Whisper modeli yükleniyor...");
  startBtn.disabled = true;

  transcriber = await pipeline(
    "automatic-speech-recognition",
    modelSelect.value,
    {
      progress_callback: data => {
        if(data.status === "progress"){
          setStatus("Model indiriliyor: %" + Math.round(data.progress || 0));
        }
      }
    }
  );

  setStatus("Model hazır");
  startBtn.disabled = false;
}

async function blobToFloat32Array(blob){
  const arrayBuffer = await blob.arrayBuffer();
  const audioContext = new AudioContext({ sampleRate: 16000 });
  const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
  const data = audioBuffer.getChannelData(0);
  await audioContext.close();
  return data;
}

async function processAudio(blob){
  if(!isRunning || isProcessing || blob.size < 1000) return;

  isProcessing = true;

  try{
    setStatus("Ses yazıya çevriliyor...", true);

    const audio = await blobToFloat32Array(blob);

    const options = {
      chunk_length_s: 30,
      stride_length_s: 5
    };

    const lang = langSelect.value;
    if(lang !== "auto"){
      options.language = lang;
      options.task = "transcribe";
    }

    const result = await transcriber(audio, options);

    const text = (result.text || "").trim();

    if(text.length > 1){
      const line = `[${timeNow()}] ${text}\n`;
      fullText += line;
      transcriptBox.textContent = fullText;
      transcriptBox.scrollTop = transcriptBox.scrollHeight;
    }

    setStatus("Dinleniyor...", true);

  }catch(err){
    console.error(err);
    setStatus("Hata: Ses işlenemedi");
  }

  isProcessing = false;
}

async function startRecording(){
  await loadModel();

  stream = await navigator.mediaDevices.getUserMedia({
    audio: {
      echoCancellation: true,
      noiseSuppression: true,
      autoGainControl: true
    }
  });

  const mimeType = MediaRecorder.isTypeSupported("audio/webm")
    ? "audio/webm"
    : "";

  mediaRecorder = new MediaRecorder(stream, mimeType ? { mimeType } : undefined);

  mediaRecorder.ondataavailable = async e => {
    if(e.data && e.data.size > 0){
      await processAudio(e.data);
    }
  };

  isRunning = true;
  mediaRecorder.start(Number(chunkSelect.value));

  startBtn.disabled = true;
  stopBtn.disabled = false;
  modelSelect.disabled = true;
  chunkSelect.disabled = true;

  if(fullText.trim() === ""){
    transcriptBox.textContent = "";
  }

  setStatus("Dinleniyor...", true);
}

function stopRecording(){
  isRunning = false;

  if(mediaRecorder && mediaRecorder.state !== "inactive"){
    mediaRecorder.stop();
  }

  if(stream){
    stream.getTracks().forEach(track => track.stop());
  }

  startBtn.disabled = false;
  stopBtn.disabled = true;
  modelSelect.disabled = false;
  chunkSelect.disabled = false;

  setStatus("Durduruldu");
}

function downloadFile(filename, content, type){
  const blob = new Blob([content], { type });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  a.click();

  URL.revokeObjectURL(url);
}

startBtn.addEventListener("click", startRecording);
stopBtn.addEventListener("click", stopRecording);

clearBtn.addEventListener("click", () => {
  fullText = "";
  transcriptBox.textContent = "Canlı transkript burada görünecek...";
});

txtBtn.addEventListener("click", () => {
  downloadFile("canli-transkript.txt", fullText, "text/plain;charset=utf-8");
});

wordBtn.addEventListener("click", () => {
  const html = `
    <html>
    <head><meta charset="utf-8"></head>
    <body>
      <h2>Canlı Transkript</h2>
      <pre style="font-family:Arial;white-space:pre-wrap;">${fullText}</pre>
    </body>
    </html>
  `;
  downloadFile("canli-transkript.doc", html, "application/msword;charset=utf-8");
});

pdfBtn.addEventListener("click", () => {
  const win = window.open("", "_blank");
  win.document.write(`
    <html>
    <head>
      <title>Canlı Transkript</title>
      <meta charset="utf-8">
      <style>
        body{font-family:Arial;padding:30px;line-height:1.7}
        pre{white-space:pre-wrap;font-size:15px}
      </style>
    </head>
    <body>
      <h2>Canlı Transkript</h2>
      <pre>${fullText}</pre>
      <script>window.print();<\/script>
    </body>
    </html>
  `);
  win.document.close();
});
</script>

</body>
</html>
