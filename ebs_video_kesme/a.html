<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EBS Audio Cleaner Pro | Video Ses Gürültü Temizleme</title>

<script src="coi-serviceworker.js"></script>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root {
    --bg-dark:#0f111a;
    --panel-dark:#161925;
    --accent-color:#007bff;
    --accent-glow:rgba(0,123,255,.35);
    --text-main:#f1f3f9;
    --text-muted:#8b949e;
    --border-color:#2d3142;
}
body {
    background:var(--bg-dark);
    color:var(--text-main);
    font-family:'Segoe UI',sans-serif;
}
.app-window {
    background:var(--panel-dark);
    border:1px solid var(--border-color);
    border-radius:16px;
    box-shadow:0 20px 50px rgba(0,0,0,.5);
    overflow:hidden;
}
.app-header {
    background:#0b0c13;
    padding:12px 20px;
    border-bottom:1px solid var(--border-color);
    display:flex;
    justify-content:space-between;
    align-items:center;
}
.window-dots span {
    display:inline-block;
    width:12px;
    height:12px;
    border-radius:50%;
    margin-right:6px;
}
.dot-red{background:#ff5f56}
.dot-yellow{background:#ffbd2e}
.dot-green{background:#27c93f}
.app-body{padding:30px}
.form-label {
    font-size:.82rem;
    text-transform:uppercase;
    letter-spacing:1px;
    color:var(--text-muted);
    font-weight:600;
}
.form-control,.form-select {
    background:#1c2030;
    border:1px solid var(--border-color);
    color:var(--text-main);
    border-radius:8px;
    padding:12px;
}
.form-control:focus,.form-select:focus {
    background:#1c2030;
    color:var(--text-main);
    border-color:var(--accent-color);
    box-shadow:0 0 10px var(--accent-glow);
}
.file-upload-wrapper {
    position:relative;
    border:2px dashed var(--border-color);
    border-radius:10px;
    padding:30px;
    text-align:center;
    background:#121420;
    cursor:pointer;
}
.file-upload-wrapper:hover {
    border-color:var(--accent-color);
    background:#181b2b;
}
.file-upload-wrapper input[type=file] {
    position:absolute;
    left:0;
    top:0;
    width:100%;
    height:100%;
    opacity:0;
    cursor:pointer;
}
.btn-primary {
    background:linear-gradient(135deg,#007bff,#0056b3);
    border:none;
    font-weight:600;
    padding:14px;
    border-radius:8px;
    box-shadow:0 4px 15px var(--accent-glow);
}
.progress {
    background:#121420;
    height:12px;
    border-radius:6px;
}
.progress-bar {
    background:linear-gradient(90deg,#007bff,#00d2ff);
}
.status-box {
    background:#121420;
    border-left:4px solid var(--accent-color);
    border-radius:4px;
}
video,audio {
    width:100%;
    border-radius:12px;
    background:#000;
    border:1px solid var(--border-color);
}
.preview-box {
    background:#121420;
    border:1px solid var(--border-color);
    border-radius:12px;
    padding:15px;
}
.small-note {
    color:var(--text-muted);
    font-size:.82rem;
}
.badge-soft {
    background:#1c2030;
    border:1px solid var(--border-color);
    color:#cdd6f4;
}
</style>
</head>

<body>

<div class="container py-5">
<div class="row justify-content-center">
<div class="col-xl-11 col-lg-12">

<div class="app-window">

<div class="app-header">
    <div class="window-dots">
        <span class="dot-red"></span>
        <span class="dot-yellow"></span>
        <span class="dot-green"></span>
    </div>
    <div class="fw-bold text-uppercase" style="font-size:.8rem;color:var(--text-muted);">
        <i class="fa-solid fa-wand-magic-sparkles text-primary me-1"></i>
        EBS Audio Cleaner Pro v2.0
    </div>
    <div></div>
</div>

<div class="app-body">
<div class="row g-4">

<div class="col-md-5 border-end" style="border-color:var(--border-color)!important;">

    <div class="mb-4">
        <label class="form-label">Video / Ses Dosyası</label>
        <div class="file-upload-wrapper">
            <i class="fa-solid fa-cloud-arrow-up fa-2x text-primary mb-2"></i>
            <p class="m-0 small text-white fw-semibold" id="fileNameDisplay">
                MP4, MOV, M4A, MP3 veya WAV seçin
            </p>
            <input type="file" id="videoInput" accept="video/*,audio/*">
        </div>
        <div class="small-note mt-2">
            Sistem önce sesi WAV formatına çevirir, sonra temizlik uygular.
        </div>
    </div>

    <div class="mb-3">
        <label class="form-label">Temizleme Profili</label>
        <select id="profileSelect" class="form-select">
            <option value="news" selected>Haber Röportajı Temizleme</option>
            <option value="wind">Rüzgar Gürültüsü Temizleme</option>
            <option value="car">Araç İçi Gürültü Temizleme</option>
            <option value="crowd">Kalabalık Ortam Temizleme</option>
            <option value="ai">Yapay Zeka Ses Netleştirme</option>
            <option value="manual">Manuel Ayar</option>
        </select>
    </div>

    <div id="manualSettings">

        <div class="mb-3">
            <label class="form-label">Gürültü Temizleme Gücü</label>
            <select id="noiseLevel" class="form-select">
                <option value="8">Hafif</option>
                <option value="15" selected>Orta</option>
                <option value="25">Güçlü</option>
                <option value="35">Çok Güçlü</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Dip Uğultu Kesme</label>
            <select id="highpass" class="form-select">
                <option value="80">80 Hz</option>
                <option value="120" selected>120 Hz</option>
                <option value="180">180 Hz</option>
                <option value="220">220 Hz</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Tiz Parazit Kesme</label>
            <select id="lowpass" class="form-select">
                <option value="7000">7000 Hz</option>
                <option value="8500" selected>8500 Hz</option>
                <option value="9000">9000 Hz</option>
                <option value="12000">12000 Hz</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Ses Yükseltme</label>
            <select id="volumeLevel" class="form-select">
                <option value="1.0">Normal</option>
                <option value="1.3" selected>+30%</option>
                <option value="1.6">+60%</option>
                <option value="2.0">2 Kat</option>
            </select>
        </div>

    </div>

    <div class="mb-3">
        <label class="form-label">Çıktı Tipi</label>
        <select id="outputMode" class="form-select">
            <option value="mp4" selected>Video varsa MP4 olarak indir</option>
            <option value="wav">Sadece temiz WAV indir</option>
            <option value="m4a">Sadece temiz M4A/AAC indir</option>
        </select>
    </div>

    <div class="d-grid mt-4">
        <button id="processBtn" class="btn btn-primary btn-lg">
            <i class="fa-solid fa-broom me-2"></i>
            SESİ TEMİZLE
        </button>
    </div>

    <div id="statusContainer" class="mt-4 d-none">
        <div class="p-3 status-box small mb-2" id="statusText">İşlem bekleniyor...</div>
        <div class="progress">
            <div id="progressBar" class="progress-bar progress-bar-striped progress-bar-animated" style="width:0%"></div>
        </div>
    </div>

</div>

<div class="col-md-7">

    <div class="preview-box mb-4">
        <div class="d-flex justify-content-between align-items-center mb-2">
            <label class="form-label m-0">Orijinal Dosya</label>
            <span class="badge badge-soft" id="inputInfo">Bekleniyor</span>
        </div>
        <video id="originalVideo" controls class="d-none"></video>
        <audio id="originalAudio" controls class="d-none"></audio>
    </div>

    <div class="preview-box">
        <div class="d-flex justify-content-between align-items-center mb-2">
            <label class="form-label m-0">Temizlenmiş Çıktı</label>
            <span class="badge badge-soft" id="outputInfo">Hazır değil</span>
        </div>

        <video id="cleanVideo" controls class="d-none"></video>
        <audio id="cleanAudio" controls class="d-none"></audio>

        <a id="downloadBtn" class="btn btn-success w-100 mt-3 d-none">
            <i class="fa-solid fa-download me-2"></i>
            Temizlenmiş Dosyayı İndir
        </a>
    </div>

    <div class="preview-box mt-4">
        <label class="form-label">Profil Açıklaması</label>
        <div id="profileDescription" class="small-note">
            Haber röportajı profili konuşmayı öne çıkarır, dip uğultu ve ortam parazitini azaltır.
        </div>
    </div>

</div>

</div>
</div>

</div>

</div>
</div>
</div>

<script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.0/dist/ffmpeg.min.js"></script>

<script>
const { createFFmpeg, fetchFile } = FFmpeg;

const ffmpeg = createFFmpeg({
    log: true,
    corePath: "https://unpkg.com/@ffmpeg/core@0.11.0/dist/ffmpeg-core.js"
});

const videoInput = document.getElementById("videoInput");
const fileNameDisplay = document.getElementById("fileNameDisplay");

const originalVideo = document.getElementById("originalVideo");
const originalAudio = document.getElementById("originalAudio");
const cleanVideo = document.getElementById("cleanVideo");
const cleanAudio = document.getElementById("cleanAudio");

const processBtn = document.getElementById("processBtn");
const statusContainer = document.getElementById("statusContainer");
const statusText = document.getElementById("statusText");
const progressBar = document.getElementById("progressBar");
const downloadBtn = document.getElementById("downloadBtn");

const profileSelect = document.getElementById("profileSelect");
const manualSettings = document.getElementById("manualSettings");
const profileDescription = document.getElementById("profileDescription");

const inputInfo = document.getElementById("inputInfo");
const outputInfo = document.getElementById("outputInfo");

let selectedFile = null;
let hasVideoStream = false;

const profileDescriptions = {
    news: "Haber röportajı profili konuşmayı öne çıkarır, dip uğultu ve ortam parazitini azaltır.",
    wind: "Rüzgar profili düşük frekanslı patlama, uğultu ve dış ortam rüzgar sesini azaltmaya odaklanır.",
    car: "Araç içi profili motor, yol ve klima uğultusunu azaltır; konuşma netliğini artırır.",
    crowd: "Kalabalık ortam profili insan uğultusu ve geniş ortam sesini azaltmaya çalışır.",
    ai: "Yapay zeka ses netleştirme profili daha agresif temizlik yapar; konuşma belirginleşir ama ses biraz yapaylaşabilir.",
    manual: "Manuel ayarda filtre gücünü kendiniz seçebilirsiniz."
};

profileSelect.addEventListener("change", () => {
    const val = profileSelect.value;
    profileDescription.innerText = profileDescriptions[val] || "";
    manualSettings.style.display = val === "manual" ? "block" : "none";
});

manualSettings.style.display = "none";

videoInput.addEventListener("change", function(e) {
    selectedFile = e.target.files[0];

    if (!selectedFile) return;

    fileNameDisplay.innerText = selectedFile.name;
    fileNameDisplay.classList.remove("text-white");
    fileNameDisplay.classList.add("text-success");

    const url = URL.createObjectURL(selectedFile);

    cleanVideo.classList.add("d-none");
    cleanAudio.classList.add("d-none");
    downloadBtn.classList.add("d-none");
    outputInfo.innerText = "Hazır değil";

    if (selectedFile.type.startsWith("audio/")) {
        originalVideo.classList.add("d-none");
        originalAudio.classList.remove("d-none");
        originalAudio.src = url;
        inputInfo.innerText = "Ses dosyası";
    } else {
        originalAudio.classList.add("d-none");
        originalVideo.classList.remove("d-none");
        originalVideo.src = url;
        inputInfo.innerText = "Video / MP4";
    }
});

ffmpeg.setLogger(({ type, message }) => {
    console.log(type, message);
});

ffmpeg.setProgress(({ ratio }) => {
    const percent = Math.min(100, Math.max(0, Math.round(ratio * 100)));
    progressBar.style.width = percent + "%";
});

function setStatus(text, percent = null) {
    statusText.innerText = text;
    if (percent !== null) {
        progressBar.style.width = percent + "%";
    }
}

function getProfileFilter(profile) {
    if (profile === "news") {
        return "highpass=f=110,lowpass=f=9000,afftdn=nr=18:nf=-28,equalizer=f=2500:t=q:w=1:g=3,volume=1.35";
    }

    if (profile === "wind") {
        return "highpass=f=180,lowpass=f=7500,afftdn=nr=28:nf=-32,equalizer=f=120:t=q:w=1:g=-5,volume=1.45";
    }

    if (profile === "car") {
        return "highpass=f=140,lowpass=f=8500,afftdn=nr=24:nf=-30,equalizer=f=180:t=q:w=1:g=-4,equalizer=f=3000:t=q:w=1:g=2,volume=1.4";
    }

    if (profile === "crowd") {
        return "highpass=f=130,lowpass=f=8000,afftdn=nr=25:nf=-30,equalizer=f=1000:t=q:w=1:g=-2,equalizer=f=2800:t=q:w=1:g=3,volume=1.35";
    }

    if (profile === "ai") {
        return "highpass=f=120,lowpass=f=8500,afftdn=nr=35:nf=-35,equalizer=f=2500:t=q:w=1:g=4,equalizer=f=4000:t=q:w=1:g=2,volume=1.5";
    }

    const noiseLevel = document.getElementById("noiseLevel").value;
    const highpass = document.getElementById("highpass").value;
    const lowpass = document.getElementById("lowpass").value;
    const volumeLevel = document.getElementById("volumeLevel").value;

    return `highpass=f=${highpass},lowpass=f=${lowpass},afftdn=nr=${noiseLevel}:nf=-25,volume=${volumeLevel}`;
}

async function checkVideoStream(inputName) {
    try {
        await ffmpeg.run(
            "-i", inputName,
            "-map", "0:v:0",
            "-frames:v", "1",
            "-f", "null",
            "-"
        );
        return true;
    } catch (e) {
        return false;
    }
}

function cleanupFiles(files) {
    files.forEach(file => {
        try {
            ffmpeg.FS("unlink", file);
        } catch(e) {}
    });
}

processBtn.addEventListener("click", async () => {
    if (!selectedFile) {
        alert("Lütfen önce dosya seçin.");
        return;
    }

    processBtn.disabled = true;
    statusContainer.classList.remove("d-none");
    progressBar.style.width = "0%";
    downloadBtn.classList.add("d-none");
    cleanVideo.classList.add("d-none");
    cleanAudio.classList.add("d-none");

    const inputName = "input_file";
    const tempWav = "temp_audio.wav";
    const cleanWav = "clean_audio.wav";
    const cleanM4a = "clean_audio.m4a";
    const outputMp4 = "clean_output.mp4";

    cleanupFiles([inputName, tempWav, cleanWav, cleanM4a, outputMp4]);

    try {
        if (!ffmpeg.isLoaded()) {
            setStatus("[CORE] FFmpeg yükleniyor...", 5);
            await ffmpeg.load();
        }

        setStatus("[1/5] Dosya hafızaya alınıyor...", 10);
        ffmpeg.FS("writeFile", inputName, await fetchFile(selectedFile));

        setStatus("[2/5] Video stream kontrol ediliyor...", 18);
        hasVideoStream = await checkVideoStream(inputName);

        if (hasVideoStream) {
            inputInfo.innerText = "Video + Ses";
        } else {
            inputInfo.innerText = "Sadece Ses";
        }

        setStatus("[3/5] MP4/MOV içindeki ses WAV formatına çevriliyor...", 30);

        await ffmpeg.run(
            "-i", inputName,
            "-vn",
            "-acodec", "pcm_s16le",
            "-ar", "48000",
            "-ac", "1",
            tempWav
        );

        const profile = profileSelect.value;
        const filter = getProfileFilter(profile);

        setStatus("[4/5] WAV ses üzerinde gürültü temizleme uygulanıyor...", 55);

        await ffmpeg.run(
            "-i", tempWav,
            "-af", filter,
            cleanWav
        );

        const outputMode = document.getElementById("outputMode").value;

        if (outputMode === "wav") {
            setStatus("[5/5] Temiz WAV dosyası hazırlanıyor...", 85);

            const data = ffmpeg.FS("readFile", cleanWav);
            const blob = new Blob([data.buffer], { type: "audio/wav" });
            const url = URL.createObjectURL(blob);

            cleanAudio.src = url;
            cleanAudio.classList.remove("d-none");

            downloadBtn.href = url;
            downloadBtn.download = "EBS_Temizlenmis_Ses.wav";
            downloadBtn.classList.remove("d-none");

            outputInfo.innerText = "WAV";
        }

        else if (outputMode === "m4a" || !hasVideoStream) {
            setStatus("[5/5] Temiz ses M4A/AAC formatına çevriliyor...", 85);

            await ffmpeg.run(
                "-i", cleanWav,
                "-c:a", "aac",
                "-b:a", "192k",
                cleanM4a
            );

            const data = ffmpeg.FS("readFile", cleanM4a);
            const blob = new Blob([data.buffer], { type: "audio/mp4" });
            const url = URL.createObjectURL(blob);

            cleanAudio.src = url;
            cleanAudio.classList.remove("d-none");

            downloadBtn.href = url;
            downloadBtn.download = "EBS_Temizlenmis_Ses.m4a";
            downloadBtn.classList.remove("d-none");

            outputInfo.innerText = "M4A / AAC";
        }

        else {
            setStatus("[5/5] Temiz ses videoya tekrar gömülüyor...", 85);

            await ffmpeg.run(
                "-i", inputName,
                "-i", cleanWav,
                "-map", "0:v:0?",
                "-map", "1:a:0",
                "-c:v", "copy",
                "-c:a", "aac",
                "-b:a", "192k",
                "-shortest",
                "-movflags", "+faststart",
                outputMp4
            );

            const data = ffmpeg.FS("readFile", outputMp4);
            const blob = new Blob([data.buffer], { type: "video/mp4" });
            const url = URL.createObjectURL(blob);

            cleanVideo.src = url;
            cleanVideo.classList.remove("d-none");

            downloadBtn.href = url;
            downloadBtn.download = "EBS_Gurultu_Temizlenmis_Video.mp4";
            downloadBtn.classList.remove("d-none");

            outputInfo.innerText = "MP4";
        }

        setStatus("[SUCCESS] İşlem tamamlandı.", 100);

        cleanupFiles([inputName, tempWav, cleanWav, cleanM4a, outputMp4]);

    } catch (error) {
        console.error(error);
        setStatus("[ERROR] Hata oluştu: " + error.message);
    }

    processBtn.disabled = false;
});
</script>

</body>
</html>
