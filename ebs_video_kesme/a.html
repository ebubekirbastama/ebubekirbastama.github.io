<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EBS Voice Clone Studio Web</title>

<script src="coi-serviceworker.js"></script>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#070707;
    color:#fff;
}

.main-card{
    background:#111;
    border:1px solid #2a2a2a;
    border-radius:20px;
}

.title-gold{
    color:#d4af37;
}

.btn-gold{
    background:#d4af37;
    color:#000;
    font-weight:bold;
}

.btn-gold:hover{
    background:#f1c84b;
    color:#000;
}

.form-control{
    background:#0b0b0b;
    color:#fff;
    border:1px solid #333;
}

.form-control:focus{
    background:#0b0b0b;
    color:#fff;
    border-color:#d4af37;
    box-shadow:none;
}

#logArea{
    height:250px;
    overflow:auto;
    background:#050505;
    border-radius:12px;
    padding:15px;
    font-family:Consolas;
    font-size:13px;
    border:1px solid #222;
}

.progress{
    height:18px;
}

#downloadBtn{
    display:none;
}
</style>
</head>
<body>

<div class="container py-5">

<div class="row justify-content-center">
<div class="col-lg-9">

<div class="main-card p-4 shadow-lg">

<h2 class="fw-bold mb-1">
<span class="title-gold">●</span>
EBS Voice Clone Studio Web
</h2>

<p class="text-secondary">
FFmpeg WASM ile referans ses hazırlama sistemi
</p>

<hr>

<div class="mb-3">
<label class="form-label fw-bold">
Ses veya Video Dosyası
</label>

<input
type="file"
id="inputFile"
class="form-control"
accept=".wav,.mp3,.m4a,.aac,.ogg,.flac,.mp4,.mov,.mkv,.avi,.webm">
</div>

<div class="row">

<div class="col-md-4 mb-3">
<label class="form-label">Maksimum Süre</label>
<input type="number" id="duration" class="form-control" value="30">
</div>

<div class="col-md-4 mb-3">
<label class="form-label">Sample Rate</label>
<input type="number" id="sampleRate" class="form-control" value="22050">
</div>

<div class="col-md-4 mb-3">
<label class="form-label">Kanal</label>

<select id="channel" class="form-control">
<option value="1">Mono</option>
<option value="2">Stereo</option>
</select>
</div>

</div>

<button id="convertBtn" class="btn btn-gold w-100 py-3">
🎙 WAV Referans Ses Oluştur
</button>

<div class="progress mt-4">
<div
id="progressBar"
class="progress-bar bg-warning"
style="width:0%">
0%
</div>
</div>

<a id="downloadBtn"
class="btn btn-success w-100 mt-4"
download="reference.wav">
📥 WAV Dosyasını İndir
</a>

<div class="mt-4">
<h5>Canlı Loglar</h5>

<div id="logArea">
Sistem hazır...
</div>
</div>

</div>

</div>
</div>
</div>

<script type="module">

import { FFmpeg } from "https://unpkg.com/@ffmpeg/ffmpeg@0.12.10/dist/esm/index.js";
import {
fetchFile,
toBlobURL
} from "https://unpkg.com/@ffmpeg/util@0.12.1/dist/esm/index.js";

const ffmpeg = new FFmpeg();

let loaded = false;

const inputFile =
document.getElementById("inputFile");

const convertBtn =
document.getElementById("convertBtn");

const progressBar =
document.getElementById("progressBar");

const downloadBtn =
document.getElementById("downloadBtn");

function log(text){

const area =
document.getElementById("logArea");

const now =
new Date().toLocaleTimeString("tr-TR");

area.innerHTML +=
"<br>[" + now + "] " + text;

area.scrollTop =
area.scrollHeight;
}

function progress(value){

progressBar.style.width =
value + "%";

progressBar.innerHTML =
value + "%";
}

async function loadFFmpeg(){

if(loaded) return;

log("FFmpeg yükleniyor...");

const baseURL =
"https://unpkg.com/@ffmpeg/core@0.12.6/dist/esm";

ffmpeg.on("log", ({message})=>{

if(message){
log(message);
}

});

ffmpeg.on("progress", ({progress:p})=>{

const percent =
Math.round(p * 100);

progress(percent);

});

await ffmpeg.load({

coreURL:
await toBlobURL(
`${baseURL}/ffmpeg-core.js`,
"text/javascript"
),

wasmURL:
await toBlobURL(
`${baseURL}/ffmpeg-core.wasm`,
"application/wasm"
)

});

loaded = true;

log("FFmpeg başarıyla yüklendi.");

}

convertBtn.addEventListener("click", async()=>{

try{

const file =
inputFile.files[0];

if(!file){

alert("Dosya seçiniz");

return;

}

convertBtn.disabled = true;

downloadBtn.style.display = "none";

progress(0);

await loadFFmpeg();

const duration =
document.getElementById("duration").value;

const sampleRate =
document.getElementById("sampleRate").value;

const channel =
document.getElementById("channel").value;

const inputName =
"input_" + file.name;

const outputName =
"reference.wav";

log("Dosya belleğe yazılıyor...");

await ffmpeg.writeFile(
inputName,
await fetchFile(file)
);

log("FFmpeg işlemi başlatıldı...");

await ffmpeg.exec([
"-y",
"-i", inputName,
"-vn",
"-ac", channel,
"-ar", sampleRate,
"-t", duration,
outputName
]);

log("WAV dosyası oluşturuldu.");

const data =
await ffmpeg.readFile(outputName);

const blob =
new Blob(
[data.buffer],
{
type:"audio/wav"
}
);

const url =
URL.createObjectURL(blob);

downloadBtn.href = url;

downloadBtn.style.display =
"block";

progress(100);

log("İşlem tamamlandı.");

}catch(err){

console.error(err);

alert(err.message);

log("HATA: " + err.message);

}
finally{

convertBtn.disabled = false;

}

});

</script>

</body>
</html>
