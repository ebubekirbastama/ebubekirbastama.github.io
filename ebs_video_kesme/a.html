<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ücretsiz Video Ses Gürültü Temizleme | EBS Audio Cleaner</title>

<script src="coi-serviceworker.js"></script>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root {
    --bg-dark:#0f111a;
    --panel-dark:#161925;
    --accent-color:#007bff;
    --accent-glow:rgba(0,123,255,.35);
    --text-main:#f1f3f9;
    --text-muted:#8b949e;
    --border-color:#2d3142;
}
body {
    background:var(--bg-dark);
    color:var(--text-main);
    font-family:'Segoe UI',sans-serif;
}
.app-window {
    background:var(--panel-dark);
    border:1px solid var(--border-color);
    border-radius:16px;
    box-shadow:0 20px 50px rgba(0,0,0,.5);
    overflow:hidden;
}
.app-header {
    background:#0b0c13;
    padding:12px 20px;
    border-bottom:1px solid var(--border-color);
    display:flex;
    justify-content:space-between;
    align-items:center;
}
.window-dots span {
    display:inline-block;
    width:12px;
    height:12px;
    border-radius:50%;
    margin-right:6px;
}
.dot-red{background:#ff5f56}
.dot-yellow{background:#ffbd2e}
.dot-green{background:#27c93f}
.app-body{padding:30px}
.form-label {
    font-size:.85rem;
    text-transform:uppercase;
    letter-spacing:1px;
    color:var(--text-muted);
    font-weight:600;
}
.form-control,.form-select {
    background:#1c2030;
    border:1px solid var(--border-color);
    color:var(--text-main);
    border-radius:8px;
    padding:12px;
}
.form-control:focus,.form-select:focus {
    background:#1c2030;
    color:var(--text-main);
    border-color:var(--accent-color);
    box-shadow:0 0 10px var(--accent-glow);
}
.file-upload-wrapper {
    position:relative;
    border:2px dashed var(--border-color);
    border-radius:10px;
    padding:30px;
    text-align:center;
    background:#121420;
    cursor:pointer;
}
.file-upload-wrapper:hover {
    border-color:var(--accent-color);
    background:#181b2b;
}
.file-upload-wrapper input[type=file] {
    position:absolute;
    left:0;
    top:0;
    width:100%;
    height:100%;
    opacity:0;
    cursor:pointer;
}
.btn-primary {
    background:linear-gradient(135deg,#007bff,#0056b3);
    border:none;
    font-weight:600;
    padding:14px;
    border-radius:8px;
    box-shadow:0 4px 15px var(--accent-glow);
}
.progress {
    background:#121420;
    height:12px;
    border-radius:6px;
}
.progress-bar {
    background:linear-gradient(90deg,#007bff,#00d2ff);
}
.status-box {
    background:#121420;
    border-left:4px solid var(--accent-color);
    border-radius:4px;
}
video {
    width:100%;
    border-radius:12px;
    background:#000;
    border:1px solid var(--border-color);
}
.preview-box {
    background:#121420;
    border:1px solid var(--border-color);
    border-radius:12px;
    padding:15px;
}
</style>
</head>

<body>

<div class="container py-5">
<div class="row justify-content-center">
<div class="col-xl-10 col-lg-11">

<div class="app-window">

<div class="app-header">
    <div class="window-dots">
        <span class="dot-red"></span>
        <span class="dot-yellow"></span>
        <span class="dot-green"></span>
    </div>
    <div class="fw-bold text-uppercase" style="font-size:.8rem;color:var(--text-muted);">
        <i class="fa-solid fa-wand-magic-sparkles text-primary me-1"></i>
        EBS Audio Cleaner Pro
    </div>
    <div></div>
</div>

<div class="app-body">
<div class="row g-4">

<div class="col-md-5 border-end" style="border-color:var(--border-color)!important;">

    <div class="mb-4">
        <label class="form-label">Video Dosyası</label>
        <div class="file-upload-wrapper">
            <i class="fa-solid fa-cloud-arrow-up fa-2x text-primary mb-2"></i>
            <p class="m-0 small text-white fw-semibold" id="fileNameDisplay">
                Video seçin veya sürükleyin
            </p>
            <input type="file" id="videoInput" accept="video/*">
        </div>
    </div>

    <div class="mb-3">
        <label class="form-label">Gürültü Temizleme Gücü</label>
        <select id="noiseLevel" class="form-select">
            <option value="8">Hafif</option>
            <option value="15" selected>Orta</option>
            <option value="25">Güçlü</option>
            <option value="35">Çok Güçlü</option>
        </select>
    </div>

    <div class="mb-3">
        <label class="form-label">Dip Uğultu Kesme</label>
        <select id="highpass" class="form-select">
            <option value="80">80 Hz</option>
            <option value="120" selected>120 Hz</option>
            <option value="180">180 Hz</option>
        </select>
    </div>

    <div class="mb-3">
        <label class="form-label">Tiz Parazit Kesme</label>
        <select id="lowpass" class="form-select">
            <option value="7000">7000 Hz</option>
            <option value="9000" selected>9000 Hz</option>
            <option value="12000">12000 Hz</option>
        </select>
    </div>

    <div class="mb-3">
        <label class="form-label">Ses Yükseltme</label>
        <select id="volumeLevel" class="form-select">
            <option value="1.0">Normal</option>
            <option value="1.3" selected>+30%</option>
            <option value="1.6">+60%</option>
            <option value="2.0">2 Kat</option>
        </select>
    </div>

    <div class="d-grid mt-4">
        <button id="processBtn" class="btn btn-primary btn-lg">
            <i class="fa-solid fa-broom me-2"></i>
            GÜRÜLTÜYÜ TEMİZLE
        </button>
    </div>

    <div id="statusContainer" class="mt-4 d-none">
        <div class="p-3 status-box small mb-2" id="statusText">İşlem bekleniyor...</div>
        <div class="progress">
            <div id="progressBar" class="progress-bar progress-bar-striped progress-bar-animated" style="width:0%"></div>
        </div>
    </div>

</div>

<div class="col-md-7">

    <div class="preview-box mb-4">
        <label class="form-label">Orijinal Video</label>
        <video id="originalVideo" controls></video>
    </div>

    <div class="preview-box">
        <label class="form-label">Temizlenmiş Video</label>
        <video id="cleanVideo" controls></video>

        <a id="downloadBtn" class="btn btn-success w-100 mt-3 d-none" download="EBS_Gurultu_Temizlenmis_Video.mp4">
            <i class="fa-solid fa-download me-2"></i>
            Temizlenmiş Videoyu İndir
        </a>
    </div>

</div>

</div>
</div>

</div>

</div>
</div>
</div>

<script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.0/dist/ffmpeg.min.js"></script>

<script>
const { createFFmpeg, fetchFile } = FFmpeg;

const ffmpeg = createFFmpeg({
    log: true,
    corePath: "https://unpkg.com/@ffmpeg/core@0.11.0/dist/ffmpeg-core.js"
});

const videoInput = document.getElementById("videoInput");
const fileNameDisplay = document.getElementById("fileNameDisplay");
const originalVideo = document.getElementById("originalVideo");
const cleanVideo = document.getElementById("cleanVideo");
const processBtn = document.getElementById("processBtn");
const statusContainer = document.getElementById("statusContainer");
const statusText = document.getElementById("statusText");
const progressBar = document.getElementById("progressBar");
const downloadBtn = document.getElementById("downloadBtn");

let selectedFile = null;

videoInput.addEventListener("change", function(e) {
    selectedFile = e.target.files[0];

    if (!selectedFile) return;

    fileNameDisplay.innerText = selectedFile.name;
    fileNameDisplay.classList.remove("text-white");
    fileNameDisplay.classList.add("text-success");

    originalVideo.src = URL.createObjectURL(selectedFile);

    cleanVideo.removeAttribute("src");
    downloadBtn.classList.add("d-none");
});

ffmpeg.setProgress(({ ratio }) => {
    const percent = Math.min(100, Math.max(0, Math.round(ratio * 100)));
    progressBar.style.width = percent + "%";
});

processBtn.addEventListener("click", async () => {
    if (!selectedFile) {
        alert("Lütfen önce video dosyası seçin.");
        return;
    }

    processBtn.disabled = true;
    statusContainer.classList.remove("d-none");
    progressBar.style.width = "0%";
    downloadBtn.classList.add("d-none");

    try {
        if (!ffmpeg.isLoaded()) {
            statusText.innerText = "[CORE] FFmpeg yükleniyor...";
            await ffmpeg.load();
        }

        statusText.innerText = "[MEDIA] Video hafızaya alınıyor...";

        const inputName = "input_video.mp4";
        const outputName = "clean_output.mp4";

        try { ffmpeg.FS("unlink", inputName); } catch(e) {}
        try { ffmpeg.FS("unlink", outputName); } catch(e) {}

        ffmpeg.FS("writeFile", inputName, await fetchFile(selectedFile));

        const noiseLevel = document.getElementById("noiseLevel").value;
        const highpass = document.getElementById("highpass").value;
        const lowpass = document.getElementById("lowpass").value;
        const volumeLevel = document.getElementById("volumeLevel").value;

        const audioFilter =
            `afftdn=nr=${noiseLevel}:nf=-25,` +
            `highpass=f=${highpass},` +
            `lowpass=f=${lowpass},` +
            `volume=${volumeLevel}`;

        statusText.innerText = "[CLEAN] Arka plan gürültüsü temizleniyor...";

        await ffmpeg.run(
            "-i", inputName,
            "-map", "0:v:0",
            "-map", "0:a:0?",
            "-c:v", "copy",
            "-af", audioFilter,
            "-c:a", "aac",
            "-b:a", "192k",
            "-movflags", "+faststart",
            outputName
        );

        statusText.innerText = "[EXPORT] Dosya hazırlanıyor...";

        const data = ffmpeg.FS("readFile", outputName);
        const blob = new Blob([data.buffer], { type: "video/mp4" });
        const url = URL.createObjectURL(blob);

        cleanVideo.src = url;
        downloadBtn.href = url;
        downloadBtn.classList.remove("d-none");

        progressBar.style.width = "100%";
        statusText.innerText = "[SUCCESS] Gürültü temizleme tamamlandı.";

        try { ffmpeg.FS("unlink", inputName); } catch(e) {}
        try { ffmpeg.FS("unlink", outputName); } catch(e) {}

    } catch (error) {
        console.error(error);
        statusText.innerText = "[ERROR] Hata oluştu: " + error.message;
    }

    processBtn.disabled = false;
});
</script>

</body>
</html>
